<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>选择题记忆库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            color-scheme: light;
            --page-bg: #fafaf9;
            --page-text: #292524;
            --panel-bg: #ffffff;
            --panel-muted: #f5f5f4;
            --panel-border: #e7e5e4;
            --panel-soft: #f8fafc;
            --accent: #b45309;
            --accent-soft: #fef3c7;
            --accent-text: #92400e;
            --success-bg: rgba(16, 185, 129, 0.09);
            --success-border: #86efac;
            --success-text: #047857;
            --danger: #dc2626;
            --muted-text: #78716c;
        }
        body.dark {
            color-scheme: dark;
            --page-bg: #121212;
            --page-text: #e7e5e4;
            --panel-bg: #1c1917;
            --panel-muted: #292524;
            --panel-border: #44403c;
            --panel-soft: #1f2937;
            --accent: #f59e0b;
            --accent-soft: rgba(245, 158, 11, 0.16);
            --accent-text: #fcd34d;
            --success-bg: rgba(16, 185, 129, 0.14);
            --success-border: #34d399;
            --success-text: #6ee7b7;
            --danger: #f87171;
            --muted-text: #a8a29e;
        }
        body {
            background: var(--page-bg);
            color: var(--page-text);
        }
        .shell-panel {
            background: var(--panel-bg);
            border-color: var(--panel-border);
            color: var(--page-text);
        }
        .shell-muted {
            background: var(--panel-muted);
            border-color: var(--panel-border);
        }
        .shell-soft {
            background: var(--panel-soft);
        }
        .shell-border {
            border-color: var(--panel-border);
        }
        .shell-input {
            background: var(--panel-bg);
            border-color: var(--panel-border);
            color: var(--page-text);
        }
        .muted-text {
            color: var(--muted-text);
        }
        .accent-pill {
            background: var(--accent-soft);
            color: var(--accent-text);
            border: 1px solid rgba(180, 83, 9, 0.2);
        }
        .active-outline {
            border-color: var(--accent);
            box-shadow: inset 3px 0 0 var(--accent);
        }
        .mastered {
            background: var(--success-bg);
            border-color: var(--success-border);
        }
        .key-term {
            display: inline-flex;
            align-items: center;
            min-height: 1.4em;
            padding: 0 0.35rem;
            border-radius: 0.35rem;
            background: var(--accent-soft);
            color: var(--accent-text);
            font-weight: 700;
        }
        body.blanks-hidden .key-term {
            min-width: 4.5rem;
            color: transparent;
            user-select: none;
            position: relative;
        }
        body.blanks-hidden .key-term::after {
            content: "";
            position: absolute;
            left: 0.45rem;
            right: 0.45rem;
            top: 50%;
            border-top: 2px solid var(--accent-text);
            opacity: 0.7;
        }
        .content-table th,
        .content-table td {
            border: 1px solid var(--panel-border);
            vertical-align: top;
        }
        .content-table th {
            background: var(--panel-muted);
        }
        .term-chip {
            background: var(--panel-muted);
            border: 1px solid var(--panel-border);
            border-radius: 0.375rem;
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
            color: var(--muted-text);
        }
        @media (max-width: 767px) {
            body {
                height: auto;
                min-height: 100vh;
                overflow: auto;
            }
            #layout {
                height: auto;
                min-height: 100vh;
            }
            #directory {
                max-height: 16rem;
            }
        }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="layout" class="h-full flex flex-col">
        <header class="shell-panel border-b shell-border px-4 md:px-6 py-3 flex items-center justify-between gap-3">
            <div class="min-w-0">
                <div class="flex items-center gap-2 text-sm muted-text">
                    <a href="./index.html" class="hover:underline">学习仪表盘</a>
                    <span>/</span>
                    <span>选择题记忆库</span>
                </div>
                <h1 id="page-title" class="text-xl md:text-2xl font-bold truncate mt-1">选择题记忆库</h1>
            </div>
            <div class="flex items-center justify-end gap-2 shrink-0 flex-wrap">
                <button id="mark-blank-btn" class="text-sm px-3 py-2 rounded-md shell-muted border shell-border">标记关键空</button>
                <button id="blank-toggle" class="text-sm px-3 py-2 rounded-md shell-muted border shell-border">隐藏关键空</button>
                <button id="theme-toggle" class="text-sm px-3 py-2 rounded-md shell-muted border shell-border">夜间模式</button>
            </div>
        </header>

        <main class="flex-1 min-h-0 grid grid-cols-1 md:grid-cols-[20rem_minmax(0,1fr)]">
            <aside class="shell-panel border-r shell-border p-4 overflow-hidden flex flex-col gap-4">
                <div class="grid grid-cols-2 gap-3">
                    <div class="shell-soft rounded-lg border shell-border p-3">
                        <div class="text-xs muted-text">章节</div>
                        <div id="chapter-count" class="text-2xl font-bold mt-1">0</div>
                    </div>
                    <div class="shell-soft rounded-lg border shell-border p-3">
                        <div class="text-xs muted-text">考点</div>
                        <div id="point-count" class="text-2xl font-bold mt-1">0</div>
                    </div>
                </div>
                <select id="chapter-jump" class="shell-input border shell-border rounded-md px-3 py-2 text-sm outline-none">
                    <option value="">跳转章节</option>
                </select>
                <input id="search-input" class="shell-input border shell-border rounded-md px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-amber-500" placeholder="搜索考点、口诀、内容">
                <div class="grid grid-cols-2 gap-2">
                    <select id="star-filter" class="shell-input border shell-border rounded-md px-3 py-2 text-sm outline-none">
                        <option value="ALL">全部星级</option>
                        <option value="5">5 星</option>
                        <option value="4">4 星及以上</option>
                        <option value="3">3 星及以上</option>
                    </select>
                    <label class="shell-muted border shell-border rounded-md px-3 py-2 text-sm flex items-center justify-center gap-2 cursor-pointer select-none">
                        <input id="unmastered-filter" type="checkbox" class="accent-amber-600">
                        <span>未掌握</span>
                    </label>
                </div>
                <div id="progress-wrap" class="shell-soft border shell-border rounded-lg p-3">
                    <div class="flex items-center justify-between text-sm mb-2">
                        <span class="font-semibold">记忆进度</span>
                        <span id="progress-text" class="muted-text">0%</span>
                    </div>
                    <div class="h-2.5 rounded-full overflow-hidden" style="background: var(--panel-border);">
                        <div id="progress-bar" class="h-full bg-emerald-600 rounded-full" style="width: 0%"></div>
                    </div>
                </div>
                <nav id="directory" class="flex-1 min-h-0 overflow-y-auto space-y-2 pr-1"></nav>
            </aside>

            <section class="min-h-0 overflow-y-auto p-4 md:p-6">
                <div id="content" class="max-w-5xl mx-auto space-y-4"></div>
            </section>
        </main>
    </div>

    <script>
        const STORAGE_KEYS = {
            theme: 'note-theme',
            blanksHidden: 'note-blanks-hidden',
            mastered: 'note-mastered',
            activePoint: 'note-active-point',
            customBlanks: 'note-custom-blanks'
        };

        const DATA_FILES = [
            './note_data.json',
            './note_data_2.json',
            './note_data_3.json',
            './note_data_4.json',
            './note_data_5.json'
        ];

        const state = {
            data: null,
            points: [],
            activePointId: '',
            query: '',
            starFilter: 'ALL',
            unmasteredOnly: false,
            mastered: new Set(),
            customBlanks: {},
            blanksHidden: false,
            isDarkMode: false
        };

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function escapeRegExp(value) {
            return String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function getCustomBlankTerms(pointId) {
            const terms = state.customBlanks[pointId];
            return Array.isArray(terms) ? terms.filter(Boolean) : [];
        }

        function applyCustomBlankTerms(value, pointId) {
            const terms = getCustomBlankTerms(pointId).sort((a, b) => b.length - a.length);
            if (!terms.length) return escapeHtml(value);
            const pattern = new RegExp(`(${terms.map(escapeRegExp).join('|')})`, 'g');
            return escapeHtml(value).replace(pattern, '<span class="key-term">$1</span>');
        }

        function renderRichText(value, pointId) {
            const source = String(value ?? '');
            const parts = [];
            let cursor = 0;
            source.replace(/\{\{(.+?)\}\}/g, (match, term, offset) => {
                if (offset > cursor) {
                    parts.push(applyCustomBlankTerms(source.slice(cursor, offset), pointId));
                }
                parts.push(`<span class="key-term">${escapeHtml(term)}</span>`);
                cursor = offset + match.length;
                return match;
            });
            if (cursor < source.length) {
                parts.push(applyCustomBlankTerms(source.slice(cursor), pointId));
            }
            return parts.join('');
        }

        function normalizePoint(chapter, point) {
            const searchText = [
                chapter.chapterTitle,
                point.pointId,
                point.pointTitle,
                point.probability,
                ...(point.mnemonics || []),
                ...(point.pastExams || []),
                ...(point.contentDetails || []).map((item) => {
                    if (item.type === 'table') {
                        return [...(item.headers || []), ...(item.rows || []).flat()].join(' ');
                    }
                    return item.content || '';
                })
            ].join(' ').toLowerCase();
            return {
                ...point,
                id: `${chapter.uid}-p${point.pointId}`,
                chapterId: chapter.chapterId,
                chapterUid: chapter.uid,
                chapterTitle: chapter.chapterTitle,
                searchText
            };
        }

        function flattenData(data) {
            return (data.chapters || []).flatMap((chapter) => (chapter.testPoints || []).map((point) => normalizePoint(chapter, point)));
        }

        function getFilteredPoints() {
            const query = state.query.trim().toLowerCase();
            const minStars = state.starFilter === 'ALL' ? 0 : Number(state.starFilter);
            return state.points.filter((point) => {
                const matchesQuery = !query || point.searchText.includes(query);
                const matchesStars = (point.priorityStars || 0) >= minStars;
                const matchesMastery = !state.unmasteredOnly || !state.mastered.has(point.id);
                return matchesQuery && matchesStars && matchesMastery;
            });
        }

        function getChapterStats(points) {
            const groups = new Map();
            points.forEach((point) => {
                if (!groups.has(point.chapterUid)) {
                    groups.set(point.chapterUid, {
                        chapterId: point.chapterUid,
                        chapterTitle: point.chapterTitle,
                        points: []
                    });
                }
                groups.get(point.chapterUid).points.push(point);
            });
            return [...groups.values()];
        }

        function renderStars(count) {
            return `<span class="tracking-normal">${'★'.repeat(count || 0)}${'☆'.repeat(Math.max(0, 5 - (count || 0)))}</span>`;
        }

        function renderDirectory() {
            const directory = document.getElementById('directory');
            const filtered = getFilteredPoints();
            if (!filtered.length) {
                directory.innerHTML = '<div class="text-sm muted-text text-center py-8">当前筛选下没有考点。</div>';
                return;
            }

            directory.innerHTML = getChapterStats(filtered).map((chapter) => `
                <div class="space-y-2">
                    <div class="text-xs font-semibold muted-text px-2 pt-2">${escapeHtml(chapter.chapterTitle)}</div>
                    ${chapter.points.map((point) => {
                        const active = point.id === state.activePointId;
                        const mastered = state.mastered.has(point.id);
                        return `
                            <button
                                data-point-id="${escapeHtml(point.id)}"
                                class="w-full text-left rounded-lg border px-3 py-3 transition ${active ? 'shell-panel active-outline' : 'shell-muted shell-border'} ${mastered ? 'mastered' : ''}"
                                onclick="selectPoint('${point.id}')"
                            >
                                <div class="flex items-start justify-between gap-2">
                                    <div class="font-semibold text-sm leading-snug">${escapeHtml(point.pointId)} ${escapeHtml(point.pointTitle)}</div>
                                    <span class="text-xs muted-text shrink-0">${mastered ? '已掌握' : ''}</span>
                                </div>
                                <div class="mt-2 flex items-center justify-between gap-2 text-xs muted-text">
                                    <span>${renderStars(point.priorityStars)}</span>
                                    <span>${escapeHtml(point.probability || '')}</span>
                                </div>
                            </button>
                        `;
                    }).join('')}
                </div>
            `).join('');
        }

        function renderChapterJump() {
            const select = document.getElementById('chapter-jump');
            const chapters = state.data?.chapters || [];
            select.innerHTML = '<option value="">跳转章节</option>' + chapters.map((chapter, index) => {
                const label = chapter.chapterTitle || `第 ${index + 1} 章`;
                return `<option value="${escapeHtml(chapter.uid)}">${escapeHtml(label)}</option>`;
            }).join('');
            const activePoint = state.points.find((point) => point.id === state.activePointId);
            select.value = activePoint?.chapterUid || '';
        }

        function renderContentBlock(block, point) {
            if (block.type === 'table') {
                return `
                    <div class="overflow-x-auto">
                        <table class="content-table w-full text-sm border-collapse">
                            <thead>
                                <tr>${(block.headers || []).map((header) => `<th class="px-3 py-2 text-left font-semibold">${renderRichText(header, point.id)}</th>`).join('')}</tr>
                            </thead>
                            <tbody>
                                ${(block.rows || []).map((row) => `
                                    <tr>${row.map((cell) => `<td class="px-3 py-2 leading-relaxed">${renderRichText(cell, point.id)}</td>`).join('')}</tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            }
            return `<p class="leading-relaxed">${renderRichText(block.content || '', point.id)}</p>`;
        }

        function renderActivePoint() {
            const content = document.getElementById('content');
            const point = state.points.find((item) => item.id === state.activePointId) || getFilteredPoints()[0];
            if (!point) {
                content.innerHTML = '<div class="shell-panel border shell-border rounded-xl p-8 text-center muted-text">没有可显示的考点。</div>';
                return;
            }
            state.activePointId = point.id;
            localStorage.setItem(STORAGE_KEYS.activePoint, point.id);

            const mastered = state.mastered.has(point.id);
            const customTerms = getCustomBlankTerms(point.id);
            const score = (state.data.chapters || []).find((chapter) => chapter.uid === point.chapterUid)?.scorePrediction;
            content.innerHTML = `
                <article class="shell-panel border shell-border rounded-xl shadow-sm overflow-hidden ${mastered ? 'mastered' : ''}">
                    <div class="p-5 md:p-6 border-b shell-border">
                        <div class="flex flex-wrap items-center gap-2 mb-3">
                            <span class="accent-pill rounded-full px-3 py-1 text-xs font-semibold">${escapeHtml(point.chapterTitle)}</span>
                            <span class="shell-muted border shell-border rounded-full px-3 py-1 text-xs">${renderStars(point.priorityStars)}</span>
                            <span class="shell-muted border shell-border rounded-full px-3 py-1 text-xs">命中概率 ${escapeHtml(point.probability || '-')}</span>
                            ${score ? `<span class="shell-muted border shell-border rounded-full px-3 py-1 text-xs">选择题 ${escapeHtml(score.choice || '-')}</span>` : ''}
                        </div>
                        <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-4">
                            <div>
                                <h2 class="text-2xl font-bold">${escapeHtml(point.pointId)} ${escapeHtml(point.pointTitle)}</h2>
                                <div class="mt-3 flex flex-wrap gap-2 text-sm">
                                    ${(point.pastExams || []).map((exam) => `<span class="shell-muted border shell-border rounded-md px-2 py-1">${escapeHtml(exam)}</span>`).join('') || '<span class="muted-text">暂无历年题标记</span>'}
                                </div>
                            </div>
                            <button onclick="toggleMastery('${point.id}')" class="text-sm px-4 py-2 rounded-md border ${mastered ? 'mastered' : 'shell-muted shell-border'}">${mastered ? '取消掌握' : '标为已掌握'}</button>
                        </div>
                    </div>
                    <div class="p-5 md:p-6 space-y-5">
                        ${customTerms.length ? `
                            <section class="shell-soft rounded-lg border shell-border p-4">
                                <div class="flex items-center justify-between gap-3 mb-3">
                                    <div class="text-sm font-semibold">自定义关键空</div>
                                    <button onclick="clearCustomBlanks('${point.id}')" class="text-xs px-3 py-1.5 rounded-md shell-muted border shell-border">清空</button>
                                </div>
                                <div class="flex flex-wrap gap-2">${customTerms.map((item) => `<span class="term-chip">${escapeHtml(item)}</span>`).join('')}</div>
                            </section>
                        ` : ''}
                        ${(point.mnemonics || []).length ? `
                            <section class="accent-pill rounded-lg p-4">
                                <div class="text-sm font-semibold mb-2">记忆口诀</div>
                                <div class="flex flex-wrap gap-2">${point.mnemonics.map((item) => `<span class="rounded-md px-2 py-1 shell-panel border shell-border">${escapeHtml(item)}</span>`).join('')}</div>
                            </section>
                        ` : ''}
                        ${(point.contentDetails || []).map((block) => renderContentBlock(block, point)).join('')}
                    </div>
                </article>
            `;
        }

        function renderProgress() {
            const total = state.points.length;
            const mastered = state.points.filter((point) => state.mastered.has(point.id)).length;
            const percent = total ? Math.round((mastered / total) * 100) : 0;
            document.getElementById('progress-text').innerText = `${mastered}/${total} (${percent}%)`;
            document.getElementById('progress-bar').style.width = `${percent}%`;
        }

        function renderAll() {
            const filtered = getFilteredPoints();
            if (!filtered.some((point) => point.id === state.activePointId)) {
                state.activePointId = filtered[0]?.id || '';
            }
            renderChapterJump();
            renderDirectory();
            renderActivePoint();
            renderProgress();
        }

        function scrollActiveDirectoryItem() {
            requestAnimationFrame(() => {
                const activeButton = document.querySelector(`[data-point-id="${CSS.escape(state.activePointId)}"]`);
                if (activeButton) {
                    activeButton.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            });
        }

        function selectPoint(id) {
            state.activePointId = id;
            renderAll();
            scrollActiveDirectoryItem();
            if (window.innerWidth <= 767) {
                document.querySelector('section').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function resetFiltersForChapterJump() {
            state.query = '';
            state.starFilter = 'ALL';
            state.unmasteredOnly = false;
            document.getElementById('search-input').value = '';
            document.getElementById('star-filter').value = 'ALL';
            document.getElementById('unmastered-filter').checked = false;
        }

        function jumpToChapter(chapterUid) {
            if (!chapterUid) return;
            const point = state.points.find((item) => item.chapterUid === chapterUid);
            if (!point) return;
            resetFiltersForChapterJump();
            state.activePointId = point.id;
            renderAll();
            scrollActiveDirectoryItem();
        }

        function toggleMastery(id) {
            if (state.mastered.has(id)) {
                state.mastered.delete(id);
            } else {
                state.mastered.add(id);
            }
            localStorage.setItem(STORAGE_KEYS.mastered, JSON.stringify([...state.mastered]));
            renderAll();
        }

        function persistCustomBlanks() {
            localStorage.setItem(STORAGE_KEYS.customBlanks, JSON.stringify(state.customBlanks));
        }

        function getSelectedTextInsideContent() {
            const selection = window.getSelection();
            if (!selection || selection.rangeCount === 0) return '';
            const range = selection.getRangeAt(0);
            const content = document.getElementById('content');
            if (!content.contains(range.commonAncestorContainer)) return '';
            return selection.toString().replace(/\s+/g, ' ').trim();
        }

        function markSelectedBlank() {
            const text = getSelectedTextInsideContent();
            if (!text) {
                alert('请先在当前考点内容里选中要挖空的文字。');
                return;
            }
            if (text.length > 80) {
                alert('选中的内容有点长，建议只标记一个关键词或短语。');
                return;
            }
            const pointId = state.activePointId;
            const terms = getCustomBlankTerms(pointId);
            if (!terms.includes(text)) {
                state.customBlanks[pointId] = [...terms, text];
                persistCustomBlanks();
            }
            window.getSelection()?.removeAllRanges();
            renderAll();
        }

        function clearCustomBlanks(pointId) {
            delete state.customBlanks[pointId];
            persistCustomBlanks();
            renderAll();
        }

        function applyTheme() {
            document.body.classList.toggle('dark', state.isDarkMode);
            document.getElementById('theme-toggle').innerText = state.isDarkMode ? '日间模式' : '夜间模式';
        }

        function applyBlankMode() {
            document.body.classList.toggle('blanks-hidden', state.blanksHidden);
            document.getElementById('blank-toggle').innerText = state.blanksHidden ? '显示关键空' : '隐藏关键空';
        }

        function loadPersistedState() {
            state.isDarkMode = localStorage.getItem(STORAGE_KEYS.theme)
                ? localStorage.getItem(STORAGE_KEYS.theme) === 'dark'
                : window.matchMedia('(prefers-color-scheme: dark)').matches;
            state.blanksHidden = localStorage.getItem(STORAGE_KEYS.blanksHidden) === 'true';
            state.activePointId = localStorage.getItem(STORAGE_KEYS.activePoint) || '';
            try {
                const saved = JSON.parse(localStorage.getItem(STORAGE_KEYS.mastered) || '[]');
                if (Array.isArray(saved)) state.mastered = new Set(saved);
            } catch (error) {
                console.warn('读取选择题掌握进度失败，已跳过。', error);
            }
            try {
                const savedBlanks = JSON.parse(localStorage.getItem(STORAGE_KEYS.customBlanks) || '{}');
                if (savedBlanks && typeof savedBlanks === 'object' && !Array.isArray(savedBlanks)) {
                    state.customBlanks = savedBlanks;
                }
            } catch (error) {
                console.warn('读取自定义关键空失败，已跳过。', error);
            }
        }

        function normalizeChapterIds(documents) {
            let fallbackId = 1;
            return documents.flatMap((documentData, documentIndex) => (documentData.chapters || []).map((chapter) => ({
                ...chapter,
                uid: `d${documentIndex + 1}-c${chapter.chapterId || fallbackId++}`,
                sourceDocument: documentData.document
            })));
        }

        async function loadData() {
            const results = await Promise.all(DATA_FILES.map(async (file, index) => {
                const response = await fetch(file, { cache: 'no-store' });
                if (!response.ok) {
                    if (index === 0) throw new Error(`${file} HTTP ${response.status}`);
                    return null;
                }
                return response.json();
            }));
            const documents = results.filter(Boolean);
            if (!documents.length) throw new Error('没有读取到可用数据');
            return {
                document: documents[0].document,
                chapters: normalizeChapterIds(documents)
            };
        }

        async function init() {
            loadPersistedState();
            applyTheme();
            applyBlankMode();

            document.getElementById('theme-toggle').addEventListener('click', () => {
                state.isDarkMode = !state.isDarkMode;
                localStorage.setItem(STORAGE_KEYS.theme, state.isDarkMode ? 'dark' : 'light');
                applyTheme();
            });
            document.getElementById('blank-toggle').addEventListener('click', () => {
                state.blanksHidden = !state.blanksHidden;
                localStorage.setItem(STORAGE_KEYS.blanksHidden, String(state.blanksHidden));
                applyBlankMode();
            });
            document.getElementById('mark-blank-btn').addEventListener('mousedown', (event) => event.preventDefault());
            document.getElementById('mark-blank-btn').addEventListener('click', markSelectedBlank);
            document.getElementById('chapter-jump').addEventListener('change', (event) => {
                jumpToChapter(event.target.value);
            });
            document.getElementById('search-input').addEventListener('input', (event) => {
                state.query = event.target.value;
                renderAll();
            });
            document.getElementById('star-filter').addEventListener('change', (event) => {
                state.starFilter = event.target.value;
                renderAll();
            });
            document.getElementById('unmastered-filter').addEventListener('change', (event) => {
                state.unmasteredOnly = event.target.checked;
                renderAll();
            });

            try {
                state.data = await loadData();
                state.points = flattenData(state.data);
                document.getElementById('page-title').innerText = `${state.data.document || '选择题记忆库'} · 选择题记忆`;
                document.getElementById('chapter-count').innerText = String((state.data.chapters || []).length);
                document.getElementById('point-count').innerText = String(state.points.length);
                if (!state.points.some((point) => point.id === state.activePointId)) {
                    state.activePointId = state.points[0]?.id || '';
                }
                renderAll();
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <div class="shell-panel border shell-border rounded-xl p-8 text-center">
                        <h2 class="text-xl font-bold">记忆库数据读取失败</h2>
                        <p class="muted-text mt-3">请通过本地服务器或 GitHub Pages 打开页面，确保 note_data.json 等数据文件与 note.html 在同一目录。</p>
                    </div>
                `;
                console.error(error);
            }
        }

        window.selectPoint = selectPoint;
        window.toggleMastery = toggleMastery;
        window.clearCustomBlanks = clearCustomBlanks;
        window.jumpToChapter = jumpToChapter;
        window.addEventListener('load', init);
    </script>
</body>
</html>
