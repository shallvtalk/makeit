<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>高项核心考点互动备考平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            color-scheme: light;
            --page-bg: #fafaf9;
            --page-text: #292524;
            --panel-bg: #ffffff;
            --panel-muted: #f5f5f4;
            --panel-border: #e7e5e4;
            --panel-soft: #f8fafc;
            --accent: #b45309;
            --accent-soft: #fef3c7;
            --accent-text: #92400e;
            --success-bg: rgba(16, 185, 129, 0.09);
            --success-border: #86efac;
            --success-text: #047857;
            --danger: #dc2626;
            --muted-text: #78716c;
        }
        body.dark {
            color-scheme: dark;
            --page-bg: #121212;
            --page-text: #e7e5e4;
            --panel-bg: #1c1917;
            --panel-muted: #292524;
            --panel-border: #44403c;
            --panel-soft: #1f2937;
            --accent: #f59e0b;
            --accent-soft: rgba(245, 158, 11, 0.16);
            --accent-text: #fcd34d;
            --success-bg: rgba(16, 185, 129, 0.14);
            --success-border: #34d399;
            --success-text: #6ee7b7;
            --danger: #f87171;
            --muted-text: #a8a29e;
        }
        body {
            background: var(--page-bg);
            color: var(--page-text);
        }
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            height: 35vh;
            max-height: 400px;
        }
        @media (min-width: 768px) {
            .chart-container {
                height: 40vh;
            }
        }
        .flip-card-inner {
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .flip-card-inner.open {
            max-height: 1000px;
            opacity: 1;
            margin-top: 1rem;
        }
        .nav-active {
            background-color: var(--panel-border);
            color: var(--page-text);
            font-weight: 600;
            border-right: 4px solid #b45309;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .shell-panel {
            background: var(--panel-bg);
            border-color: var(--panel-border);
            color: var(--page-text);
        }
        .shell-panel-muted {
            background: var(--panel-muted);
            border-color: var(--panel-border);
        }
        .shell-input {
            background: var(--panel-bg);
            border-color: var(--panel-border);
            color: var(--page-text);
        }
        .shell-soft {
            background: var(--panel-soft);
        }
        .shell-border {
            border-color: var(--panel-border);
        }
        .muted-text {
            color: var(--muted-text);
        }
        .card-mastered {
            background: var(--success-bg);
            border-color: var(--success-border);
        }
        .mastery-on {
            background: var(--success-bg);
            color: var(--success-text);
            border-color: var(--success-border);
        }
        .mastery-off {
            background: var(--panel-muted);
            color: var(--muted-text);
            border-color: var(--panel-border);
        }
        .hook-box {
            background: var(--accent-soft);
            border-color: rgba(180, 83, 9, 0.25);
            color: var(--accent-text);
        }
        .theme-toggle {
            min-width: 5.75rem;
        }
        .mobile-menu-open {
            transform: translateX(0);
        }
        .mobile-backdrop {
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(2px);
        }
        .note-box {
            background: var(--panel-soft);
            border: 1px solid var(--panel-border);
        }
        .note-textarea {
            width: 100%;
            min-height: 6.5rem;
            resize: vertical;
        }
        .training-pill {
            background: var(--accent-soft);
            color: var(--accent-text);
            border: 1px solid rgba(180, 83, 9, 0.18);
        }
        .training-card {
            background: linear-gradient(145deg, var(--panel-bg), var(--panel-soft));
        }
        .training-prompt {
            white-space: pre-line;
        }
        .process-group-badge {
            color: #ffffff;
            border-radius: 999px;
            padding: 0.2rem 0.7rem;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .training-directory {
            overflow-y: auto;
        }
        .training-directory button {
            display: block;
            width: 100%;
            text-align: left;
            box-sizing: border-box;
        }
        .training-directory-mobile button {
            display: block;
            width: 100%;
            text-align: left;
            box-sizing: border-box;
        }
        .mobile-training-panel {
            display: none;
        }
        .mobile-training-panel summary {
            list-style: none;
        }
        .mobile-training-panel summary::-webkit-details-marker {
            display: none;
        }
        .desktop-actions {
            display: none;
        }
        @media (min-width: 768px) {
            .desktop-actions {
                display: flex;
            }
            .training-directory {
                max-height: calc(100vh - 10rem);
                padding-right: 0.25rem;
            }
        }
        @media (max-width: 767px) {
            body {
                height: auto;
                min-height: 100vh;
                overflow: auto;
            }
            body.menu-open {
                overflow: hidden;
            }
            #sidebar {
                width: min(22rem, 86vw);
                max-width: 86vw;
                transform: translateX(-110%) !important;
            }
            #sidebar.mobile-menu-open {
                transform: translateX(0) !important;
            }
            #mobile-chapter-tools {
                display: none !important;
            }
            #mobile-chapter-tools.mobile-tools-visible {
                display: flex !important;
            }
            body {
                touch-action: manipulation;
            }
            .training-directory {
                display: none;
            }
            .desktop-training-controls {
                display: none !important;
            }
            .mobile-training-panel {
                display: block;
            }
            .flip-card-inner.open {
                max-height: 1600px;
            }
        }
    </style>
</head>
<body class="font-sans h-screen flex overflow-hidden">

    <!-- Chosen Palette: Warm Neutrals (Stone, Amber, Emerald for status) -->
    <!-- Application Structure Plan: The application is structured as an interactive "Study Dashboard" utilizing Active Recall. The content is parsed exactly from the source PDF, presenting chapters sequentially. Priority filters and mastery trackers allow for targeted, logic-driven study sessions. -->
    <!-- Visualization & Content Choices: 
         1. Doughnut Chart: Overall workload distribution by priority (Chart.js, Canvas).
         2. Bar Chart: Mastered vs Pending questions per chapter (Chart.js, Canvas).
         3. Accordions: Flashcard style reveal for active recall testing.
         NO SVG. NO Mermaid. -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->

    <div id="mobile-backdrop" class="mobile-backdrop fixed inset-0 z-20 hidden md:hidden"></div>

    <aside id="sidebar" class="shell-panel fixed inset-y-0 left-0 w-72 border-r flex flex-col h-full flex-shrink-0 z-30 shadow-lg transition-transform duration-300 -translate-x-full md:translate-x-0 md:static md:z-10">
        <div class="p-6 border-b shell-border">
            <div class="flex items-start justify-between gap-4">
                <div>
                    <h1 class="text-xl font-bold tracking-tight">高项核心考点</h1>
                    <p class="text-xs muted-text mt-1">信息系统项目管理师备考通</p>
                </div>
                <button id="btn-close-menu" class="md:hidden px-2 py-1 rounded-md shell-panel-muted text-sm">关闭</button>
            </div>
        </div>
        <nav id="sidebar-nav" class="flex-1 overflow-y-auto scrollbar-hide py-4">
        </nav>
        <div class="p-4 border-t shell-border shell-panel-muted">
            <div class="text-xs muted-text mb-2">全局掌握进度</div>
            <div class="w-full rounded-full h-2.5" style="background: var(--panel-border);">
                <div id="global-progress-bar" class="bg-emerald-600 h-2.5 rounded-full" style="width: 0%"></div>
            </div>
            <div id="global-progress-text" class="text-right text-xs mt-1 font-medium">0%</div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 h-full relative overflow-hidden">
        <header class="shell-panel px-4 md:px-8 py-4 md:py-5 border-b shell-border flex justify-between items-center shadow-sm z-10 gap-3">
            <div class="flex items-center gap-3 min-w-0">
                <button id="btn-open-menu" class="md:hidden px-3 py-2 rounded-md shell-panel-muted text-sm">目录</button>
                <h2 id="current-section-title" class="text-xl md:text-2xl font-bold truncate">学习仪表盘</h2>
            </div>
            <div class="flex items-center gap-2 shrink-0">
                <button id="notes-visibility-toggle" class="theme-toggle text-sm px-3 py-2 rounded-md shell-panel-muted border shell-border transition duration-200">无备注版</button>
                <button id="theme-toggle" class="theme-toggle text-sm px-3 py-2 rounded-md shell-panel-muted border shell-border transition duration-200">夜间模式</button>
                <div id="header-actions" class="desktop-actions hidden items-center">
                    <button id="btn-expand-all" class="text-sm px-4 py-2 rounded-md transition duration-200 font-medium mr-2 shell-panel-muted border shell-border">展开全部答案</button>
                    <select id="priority-filter" class="text-sm shell-panel border shell-border px-3 py-2 rounded-md outline-none focus:ring-2 focus:ring-amber-500">
                        <option value="ALL">全部优先级</option>
                        <option value="🔴">🔴 必背</option>
                        <option value="🟡">🟡 背诵</option>
                        <option value="🟢">🟢 熟练</option>
                    </select>
                </div>
            </div>
        </header>

        <div id="mobile-chapter-tools" class="hidden md:hidden px-4 py-3 border-b shell-border shell-panel gap-2 flex">
            <button id="btn-expand-all-mobile" class="flex-1 text-sm px-4 py-2 rounded-md transition duration-200 font-medium shell-panel-muted border shell-border">展开全部答案</button>
            <select id="priority-filter-mobile" class="flex-1 text-sm shell-panel border shell-border px-3 py-2 rounded-md outline-none">
                    <option value="ALL">全部优先级</option>
                    <option value="🔴">🔴 必背</option>
                    <option value="🟡">🟡 背诵</option>
                    <option value="🟢">🟢 熟练</option>
                </select>
            </div>

        <div id="main-content-scroll" class="flex-1 overflow-y-auto p-4 md:p-8">
            <div id="dashboard-view" class="max-w-6xl mx-auto block">
                <div class="mb-8">
                    <h3 class="text-2xl md:text-3xl font-bold mb-4">欢迎来到高项备考互动平台</h3>
                    <p class="muted-text leading-relaxed text-base md:text-lg">
                        本平台包含原文档 100% 完整的 173 个理论必背考点。请利用侧边栏导航，结合主动回想（Active Recall）机制，点击题目检验记忆。标记“已掌握”以更新仪表盘数据。
                    </p>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                    <div class="shell-panel p-5 md:p-6 rounded-xl shadow-sm border">
                        <h4 class="text-lg font-semibold mb-2">考点优先级分布</h4>
                        <p class="text-sm muted-text mb-6">了解不同重要程度的考点比例，合理分配复习精力。</p>
                        <div class="chart-container">
                            <canvas id="priorityChart"></canvas>
                        </div>
                    </div>
                    <div class="shell-panel p-5 md:p-6 rounded-xl shadow-sm border">
                        <h4 class="text-lg font-semibold mb-2">各章节考点数量</h4>
                        <p class="text-sm muted-text mb-6">直观对比各章知识点密度，攻克重难点章节。</p>
                        <div class="chart-container">
                            <canvas id="chapterChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="shell-panel p-5 md:p-6 rounded-xl shadow-sm border">
                    <div class="flex items-start justify-between gap-4 flex-col md:flex-row">
                        <div>
                            <h4 class="text-lg font-semibold mb-2">过程-定义-输出训练</h4>
                            <p class="text-sm muted-text leading-relaxed">专门训练十大知识领域中的过程定义、主要输出和主要作用。适合做碎片化抽问、闭眼回忆和考前速刷。</p>
                        </div>
                        <button id="btn-open-process-training" class="text-sm px-4 py-2 rounded-md transition duration-200 font-medium shell-panel-muted border shell-border whitespace-nowrap">开始训练</button>
                    </div>
                </div>
            </div>

            <div id="chapter-view" class="max-w-4xl mx-auto hidden">
                <div id="cards-container" class="space-y-4">
                </div>
            </div>

            <div id="process-training-view" class="w-full max-w-7xl mx-auto hidden">
                <div id="process-training-container"></div>
            </div>
        </div>
    </main>

    <script>
        // Data strictly synchronized with the PDF content.
        const STORAGE_KEYS = {
            theme: 'makeit-theme',
            mastery: 'makeit-mastered',
            notes: 'makeit-notes',
            notesVisible: 'makeit-notes-visible'
        };

        function deepFreeze(obj) {
            if (!obj || typeof obj !== 'object' || Object.isFrozen(obj)) return obj;
            Object.freeze(obj);
            Object.getOwnPropertyNames(obj).forEach((key) => {
                deepFreeze(obj[key]);
            });
            return obj;
        }

        function cloneStudyData(data) {
            return JSON.parse(JSON.stringify(data));
        }

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        const ORIGINAL_STUDY_DATA = deepFreeze([
            {
                chapter: "第6章 项目管理概论",
                questions: [
                    { id: "c6_q1", title: "【问1】PMO的三种类型?", priority: "🟡", content: "支持型、控制型和指令型", hook: "" },
                    { id: "c6_q2", title: "【问2】开发生命周期有哪几种?", priority: "🔴", content: "① 预测型生命周期<br>② 迭代型生命周期<br>③ 增量型生命周期<br>④ 适应型生命周期<br>⑤ 混合型生命周期", hook: "" },
                    { id: "c6_q3", title: "【问3】项目管理过程组?", priority: "🔴", content: "① 启动过程组<br>② 规划过程组<br>③ 执行过程组<br>④ 监控过程组<br>⑤ 收尾过程组", hook: "" },
                    { id: "c6_q4", title: "【问4】项目管理十大知识领域?", priority: "🔴", content: "① 项目整合管理<br>② 项目范围管理<br>③ 项目进度管理<br>④ 项目成本管理<br>⑤ 项目质量管理<br>⑥ 项目资源管理<br>⑦ 项目沟通管理<br>⑧ 项目风险管理<br>⑨ 项目采购管理<br>⑩ 项目干系人管理", hook: "盒饭进城，娘子通风狗官" }
                ]
            },
            {
                chapter: "第7章 项目立项管理",
                questions: [
                    { id: "c7_q1", title: "【问1】项目投资前的四个阶段?", priority: "🔴", content: "① 项目建议与立项申请<br>② 初步可行性研究<br>③ 详细可行性研究<br>④ 评估与决策", hook: "" },
                    { id: "c7_q2", title: "【问2】项目建议书的作用?", priority: "🟢", content: "① 是项目建设单位向上级主管部门提交项目申请时所必须的文件<br>② 是该项目建设筹建单位根据国民经济的发展、规划、政策、条件等，提出的某一具体项目的建议文件<br>③ 是对拟建项目提出的框架性总体设想<br>④ 是国家或上级主管部门选择项目的依据，也是可行性研究的依据。", hook: "" },
                    { id: "c7_q3", title: "【问3】项目建议书的内容?", priority: "🔴", content: "① 项目的必要性<br>② 项目的市场预测<br>③ 项目预期成果的市场预测<br>④ 项目建设必需的条件", hook: "两必，两测" },
                    { id: "c7_q4", title: "【问4】可行性研究的内容?", priority: "🔴", content: "① 技术可行性分析<br>② 经济可行性分析<br>③ 社会效益可行性分析<br>④ 运行环境可行性分析<br>⑤ 其他方面的可行性分析", hook: "经济小运气" },
                    { id: "c7_q5", title: "【问5】技术可行性分析考虑的因素?", priority: "🟡", content: "① 进行项目开发的风险<br>② 人力资源的有效性<br>③ 技术能力的可能性<br>④ 物资(产品)的可用性", hook: "疯人记物" },
                    { id: "c7_q6", title: "【问6】经济可行性分析包括哪些?", priority: "🟡", content: "① 支出分析；② 收益分析；③ 收益投资比、投资回报分析；④ 敏感性分析", hook: "" },
                    { id: "c7_q7", title: "【问7】社会效益可行性分析包括哪些?", priority: "🟡", content: "(1) 组织内部。品牌效益、竞争力效益、技术创新效益、人员提升收益、管理提升效益。<br>(2) 社会发展。公共效益、文化效益、环境效益、社会责任感效益、其他收益。", hook: "" },
                    { id: "c7_q8", title: "【问8】运行环境可行性分析包括哪些?", priority: "🟡", content: "用户的管理体制、管理方法、规章制度、工作习惯、人员素质、数据资源积累、基础软硬件平台等。", hook: "" },
                    { id: "c7_q9", title: "【问9】其他方面的可行性分析包括哪些?", priority: "🟡", content: "法律可行性、政策可行性等。", hook: "" },
                    { id: "c7_q10", title: "【问10】可以从哪些方面进行衡量，决定是否开始详细可行性研究?", priority: "🟢", content: "① 分析项目的前途，从而决定是否应该继续深入调查研究；<br>② 初步估计和确定项目中的关键技术及核心问题，以确定是否需要解决；<br>③ 初步估计必须进行的辅助研究，以解决项目的核心问题等。", hook: "" },
                    { id: "c7_q11", title: "【问11】初步可行性研究主要回答的问题?", priority: "🟡", content: "① 项目进行投资建设是否具有必要性<br>② 项目建设的周期是否合理且可接受<br>③ 项目需要的人力、财力资源等是否可接受<br>④ 项目的功能和目标是否可以实现<br>⑤ 项目的经济效益、社会效益是否可以保证", hook: "" },
                    { id: "c7_q12", title: "【问12】初步可行性研究的内容?", priority: "🟡", content: "① 需求与市场预测<br>② 设备与资源投入分析<br>③ 空间布局<br>④ 项目设计<br>⑤ 项目投资与成本估算", hook: "" },
                    { id: "c7_q13", title: "【问13】详细可行性研究的方法?", priority: "🟡", content: "① 经济评价法；② 市场预测法；③ 投资估算法；④ 增量净效益法", hook: "" },
                    { id: "c7_q14", title: "【问14】详细可行性研究的内容?", priority: "🟡", content: "① 市场需求预测<br>② 部件和投入的选择供应<br>③ 信息系统架构及技术方案的确定<br>④ 技术与设备选择<br>⑤ 网络物理布局设计<br>⑥ 投资、成本估算与资金筹措", hook: "" },
                    { id: "c7_q15", title: "【问15】项目评估的目的?", priority: "🟢", content: "项目评估是项目投资前期进行决策管理的重要环节，其目的是审查项目可行性研究的可靠性、真实性和客观性，为银行的贷款决策或行政主管部门的审批决策提供科学依据。", hook: "" },
                    { id: "c7_q16", title: "【问16】项目评估的依据?", priority: "🟡", content: "① 项目建议书及其批准文件<br>② 项目可行性研究报告<br>③ 报送组织的申请报告及主管部门的初审意见<br>④ 项目关键建设条件和工程等的协议文件<br>⑤ 必需的其他文件和资料等", hook: "" },
                    { id: "c7_q17", title: "【问17】项目评估的程序?", priority: "🟢", content: "① 成立评估小组<br>② 开展调查研究<br>③ 收集数据资料<br>④ 分析与评估<br>⑤ 编写、讨论、修改评估报告<br>⑥ 召开专家论证会；评估报告定稿并发布", hook: "" },
                    { id: "c7_q18", title: "【问18】项目评估报告内容大纲?", priority: "🟢", content: "① 项目概况；② 详细评估意见；③ 总结和建议", hook: "" }
                ]
            },
            {
                chapter: "第8章 项目整合管理",
                questions: [
                    { id: "c8_q1", title: "【问1】项目整合管理的目标?", priority: "🟡", content: "① 资源分配；② 平衡竞争性需求；③ 研究各种备选方法；④ 裁剪过程以实现项目目标；⑤ 管理各个项目管理知识领域之间的依赖关系", hook: "" },
                    { id: "c8_q2", title: "【问2】执行整合的三个层面?", priority: "🟡", content: "① 过程层面；② 认知层面；③ 背景层面", hook: "" },
                    { id: "c8_q3", title: "【问3】整合管理的过程及其过程组?", priority: "🔴", content: "① 制定项目章程->启动过程组<br>② 制订项目管理计划->规划过程组<br>③ 指导与管理项目执行->执行过程组<br>④ 管理项目知识->执行过程组<br>⑤ 监控项目工作->监控过程组<br>⑥ 实施整体变更控制->监控过程组<br>⑦ 结束项目或阶段->收尾过程组", hook: "" },
                    { id: "c8_q4", title: "【问4】制定项目章程的作用?", priority: "🟡", content: "① 明确项目与组织战略目标之间的直接联系<br>② 确立项目的正式地位<br>③ 展示组织对项目的承诺", hook: "" },
                    { id: "c8_q5", title: "【问5】项目章程的内容?", priority: "🟡", content: "① 项目目的<br>② 可测量的项目目标和相关的成功标准<br>③ 高层级需求、高层级项目描述、边界定义以及主要可交付成果<br>④ 整体项目风险<br>⑤ 总体里程碑进度计划<br>⑥ 预先批准的财务资源<br>⑦ 关键干系人名单<br>⑧ 项目审批要求<br>⑨ 项目退出标准<br>⑩ 委派的项目经理及其职责和职权<br>⑪ 发起人或其他批准项目章程的人员的姓名和职权等", hook: "风记理发的才人表叔胜出" },
                    { id: "c8_q6", title: "【问6】项目管理计划的内容?", priority: "🟡", content: "① (范围、需求、进度、成本、质量、资源、沟通、风险、采购、干系人、变更、配置) 管理计划<br>② (范围、进度、成本、绩效测量) 基准<br>③ 项目生命周期描述、开发方法", hook: "" },
                    { id: "c8_q7", title: "【问7】变更请求包括?", priority: "🟡", content: "① 纠正措施；② 预防措施；③ 缺陷补救；④ 更新", hook: "正房缺更" },
                    { id: "c8_q8", title: "【问8】管理项目知识的作用?", priority: "🟡", content: "① 利用已有的组织知识来创造或改进项目成果；<br>② 使当前项目创造的知识可用于支持组织运营和未来的项目或阶段。", hook: "" },
                    { id: "c8_q9", title: "【问9】监控项目工作过程主要关注?", priority: "🟢", content: "① 把项目的实际绩效与项目管理计划进行比较；<br>② 定期评估项目绩效，决定是否需要采取纠正或预防措施；<br>③ 检查单个项目风险的状态；<br>④ 维护一个准确且及时更新的信息库；<br>⑤ 为状态报告、进展测量和预测提供信息；<br>⑥ 做出预测，以更新当前的成本与进度信息；<br>⑦ 监督已批准变更的实施情况；<br>⑧ 向项目集管理层报告项目进展和状态；<br>⑨ 确保项目与商业需求保持一致等。", hook: "" },
                    { id: "c8_q10", title: "【问10】配置控制和变更控制的不同点?", priority: "🟢", content: "① 配置控制重点关注可交付成果及各个过程的技术规范。<br>② 变更控制重点关注识别、记录、批准或否决对项目文件、可交付成果或基准的变更。", hook: "" },
                    { id: "c8_q11", title: "【问11】结束项目或阶段要执行的活动?", priority: "🟡", content: "① 为达到阶段或项目的完工或退出标准所必须的行动和活动<br>② 为关闭项目合同协议或项目阶段合同协议所必须开展的活动<br>③ 为完成收集记录、审计项目成败、管理知识分享、总结经验教训、存档项目信息等工作所必须开展的活动<br>④ 为向下一个阶段，或者向运营部门移交项目成果所必须开展的活动<br>⑤ 收集改进或更新组织政策和程序的建议<br>⑥ 测量干系人的满意程度等<br>⑦ 调查和记录提前终止的原因（如果提前终止）", hook: "" },
                    { id: "c8_q12", title: "【问12】项目最终报告的内容?", priority: "🟢", content: "① 项目或阶段的概述；<br>② 范围目标、范围的评估标准，完工标准证据；<br>③ 质量目标、质量的评估标准、核实信息和实际里程碑日期及偏差原因；<br>④ 成本目标，包括可接受成本区间、实际成本及偏差原因；<br>⑤ 最终产品、服务或成果的确认信息的总结；<br>⑥ 进度计划目标；<br>⑦ 最终产品如何满足业务需求的概述；<br>⑧ 发生的风险或问题及其解决情况的概述等。", hook: "" }
                ]
            },
            {
                chapter: "第9章 项目范围管理",
                questions: [
                    { id: "c9_q1", title: "【问1】范围管理的过程及其过程组?", priority: "🔴", content: "① 规划范围管理->规划过程组<br>② 收集需求->规划过程组<br>③ 定义范围->规划过程组<br>④ 创建WBS->规划过程组<br>⑤ 确认范围->监控过程组<br>⑥ 控制范围->监控过程组", hook: "" },
                    { id: "c9_q2", title: "【问2】需求管理计划的内容?", priority: "🟡", content: "① 如何规划、跟踪和报告各种需求活动<br>② 配置管理活动<br>③ 需求优先级排序过程<br>④ 测量指标及使用这些指标的理由<br>⑤ 反映哪些需求属性将被列入跟踪矩阵等", hook: "1规划，2配置，3排序，4测量，5反映" },
                    { id: "c9_q3", title: "【问3】需求的分类?", priority: "🟡", content: "① 业务需求；② 干系人需求；③ 解决方案需求；④ 过渡和就绪需求；⑤ 项目需求；⑥ 质量需求", hook: "" },
                    { id: "c9_q4", title: "【问4】需求跟踪矩阵的作用?", priority: "🟡", content: "① 把每个需求与业务目标或项目目标联系起来，有助于确保每个需求都具有业务价值<br>② 提供了在整个项目生命周期中跟踪需求的一种方法，确保需求在项目结束的时候都能实现并交付<br>③ 为管理产品范围变更提供了框架", hook: "" },
                    { id: "c9_q5", title: "【问5】需求跟踪矩阵的内容?", priority: "🟢", content: "① 业务需要、机会、目的和目标<br>② 项目目标<br>③ 项目范围和WBS可交付成果<br>④ 产品设计<br>⑤ 产品开发<br>⑥ 测试策略和测试场景<br>⑦ 高层级需求到详细需求等", hook: "" },
                    { id: "c9_q6", title: "【问6】项目范围说明书的内容?", priority: "🔴", content: "① 产品范围描述<br>② 可交付成果<br>③ 验收标准<br>④ 项目的除外责任", hook: "产教研外" },
                    { id: "c9_q7", title: "【问7】项目范围说明书和项目章程?", priority: "🟢", content: "项目章程和项目范围说明书的内容存在一定程度的重叠，但详细程度完全不同。项目章程包含高层级的信息，而项目范围说明书则是对范围组成部分的详细描述。", hook: "" },
                    { id: "c9_q8", title: "【问8】WBS的分解步骤?", priority: "🔴", content: "① 识别和分析可交付成果及相关工作<br>② 确定WBS的结构和编排方法<br>③ 自上而下逐层细化分解<br>④ 为WBS组成部分制定和分配标识编码<br>⑤ 核实可交付成果分解的程度是恰当的", hook: "1识别，2确定，3分解，4编码，5核实" },
                    { id: "c9_q9", title: "【问9】WBS分解注意事项?", priority: "🔴", content: "① WBS 必须是面向可交付成果的。<br>② WBS必须符合项目的范围。100%原则认为，在WBS中，所有下一级的元素之和必须100%代表上一级元素。<br>③ WBS的底层应该支持计划和控制。<br>④ WBS 中的元素必须有人负责，而且只由一个人负责。<br>⑤ WBS 应控制在4~6层。避免交叉从属。<br>⑥ WBS 应包括项目管理工作，也要包括分包出去的工作。<br>⑦ WBS的编制需要主要项目干系人的参与。<br>⑧ WBS并非是一成不变的。", hook: "面向成果、符合范围、支持计划、一人负责、控制层次、包括管理、干系人参与、可以修改" },
                    { id: "c9_q10", title: "【问10】WBS的表示形式?", priority: "🟡", content: "WBS 可以采用提纲式、组织结构图或能说明层级结构的其他形式。", hook: "" },
                    { id: "c9_q11", title: "【问11】范围基准包含的内容?", priority: "🔴", content: "批准的范围说明书，WBS，WBS字典", hook: "" },
                    { id: "c9_q12", title: "【问12】确认范围的步骤?", priority: "🔴", content: "① 确定需要进行范围确认的时间<br>② 识别范围确认需要哪些投入<br>③ 确定范围正式被接受的标准和要素<br>④ 确定范围确认会议的组织步骤<br>⑤ 组织范围确认会议", hook: "1时间，2投入，3标准，4步骤，5组织" },
                    { id: "c9_q13", title: "【问13】确认范围和质量控制的不同点?", priority: "🟢", content: "① 确认范围过程关注可交付成果的验收，控制质量过程关注正确性。<br>② 质量控制一般在确认范围前进行，也可同时进行。<br>③ 质量控制属于内部检查，范围确认是由外部干系人进行检查。<br>④ 确认范围和质量控制是递进的、越来越细的检查过程。", hook: "" },
                    { id: "c9_q14", title: "【问14】确认范围前需要检查的问题", priority: "🟢", content: "① 可交付成果是否是确定的、可确认的。<br>② 每个可交付成果是否有明确的里程碑事件。<br>③ 是否有明确的质量标准。<br>④ 审核和承诺是否有清晰的表达。<br>⑤ 项目范围是否覆盖了所有活动。<br>⑥ 项目范围的风险是否太高。", hook: "" },
                    { id: "c9_q15", title: "【问15】干系人关注点的不同?", priority: "🟡", content: "① 管理层主要关注项目范围。<br>② 客户主要关注产品范围。<br>③ 项目管理人员主要关注项目制约因素。<br>④ 项目团队成员主要关注项目范围中自己参与和负责的元素。", hook: "" }
                ]
            },
            {
                chapter: "第10章 项目进度管理",
                questions: [
                    { id: "c10_q1", title: "【问1】进度管理的过程及其过程组?", priority: "🔴", content: "① 规划进度管理->规划过程组<br>② 定义活动->规划过程组<br>③ 排列活动顺序->规划过程组<br>④ 估算活动持续时间->规划过程组<br>⑤ 制定进度计划->规划过程组<br>⑥ 控制进度->监控过程组", hook: "" },
                    { id: "c10_q2", title: "【问2】制订进度计划的关键步骤?", priority: "🟢", content: "① 定义项目里程碑，识别活动并排列顺序，估算持续时间，确定开始和完成日期。<br>② 各个活动的项目人员审查其被分配的活动。<br>③ 项目人员确认日期与资源日历没有冲突。<br>④ 分析进度计划，确定逻辑关系冲突，以及在批准基准之前是否需要资源平衡，修订进度模型。", hook: "" },
                    { id: "c10_q3", title: "【问3】进度计划的三种形式?", priority: "🟡", content: "① 里程碑进度计划，也叫里程碑图<br>② 概括性进度计划，也叫横道图<br>③ 详细进度计划，也叫项目进度网络图", hook: "" },
                    { id: "c10_q4", title: "【问4】控制进度关注的内容?", priority: "🟡", content: "① 判断项目进度的当前状态<br>② 对引起进度变更的因素施加影响<br>③ 重新考虑必要的进度储备<br>④ 判断项目进度是否已经发生变更<br>⑤ 在变更实际发生时对其进行管理", hook: "" },
                    { id: "c10_q5", title: "【问5】进度落后，成本节约措施?", priority: "🔴", content: "① 在继续控制成本的情况下，赶工，以缩短关键活动的工期。<br>② 在控制风险的情况下，快速跟进，并行施工，以缩短关键路径的长度。<br>③ 在继续控制成本的情况下，使用高素质的资源或经验更丰富的人员。<br>④ 经过客户同意，减小活动范围或降低活动要求。<br>⑤ 在继续控制成本的情况下，改进方法或技术，以提高生产效率。<br>⑥ 在继续控制成本的情况下，加强质量管理，及时发现问题，减少返工，从而缩短工期。", hook: "" },
                    { id: "c10_q6", title: "【问6】进度落后，成本超支措施?", priority: "🔴", content: "① 在控制成本的情况下，赶工，以缩短关键活动的工期。<br>② 在控制风险的情况下，快速跟进，并行施工，以缩短关键路径的长度。<br>③ 在控制成本的情况下，使用高素质的资源或经验更丰富的人员。<br>④ 经过客户同意，减小活动范围或降低活动要求。<br>⑤ 在控制成本的情况下，改进方法或技术，以提高生产效率。<br>⑥ 在控制成本的情况下，加强质量管理，减少返工。<br>⑦ 找出成本超支的原因，对其进行细化分析。<br>⑧ 针对不同的超支原因，采取对应的解决措施。<br>⑨ 定期对项目的成本绩效进行评估，及时按情况进行调整。", hook: "" },
                    { id: "c10_q7", title: "【问7】进度提前，成本节约措施", priority: "🔴", content: "① 排查项目活动完成情况，防止活动遗漏<br>② 审查质量，防止质量出现问题<br>③ 审查项目风险，防止出现整体风险<br>④ 审查资源使用情况，防止资源被提前使用<br>⑤ 预测项目成本，在控制风险的情况下，适当调整成本计划<br>⑥ 预测项目进度，在控制风险的情况下，适当调整进度计划。<br>⑦ 在控制风险的情况下，可以抽调部分人员用于其它项目<br>⑧ 在控制风险的情况下，可以适当减少成本的投入", hook: "" },
                    { id: "c10_q8", title: "【问8】进度提前，成本超支措施", priority: "🔴", content: "① 排查项目活动完成情况，防止活动遗漏<br>② 审查质量，防止质量出现问题<br>③ 在控制成本的情况下，使用高素质的资源或经验更丰富的人员。<br>④ 经过客户同意，减小活动范围或降低活动要求，从而控制成本。<br>⑤ 在控制成本的情况下，改进方法或技术，以提高生产效率，从而控制成本。<br>⑥ 在控制成本的情况下，加强质量管理，减少返工。<br>⑦ 找出成本超支的原因，对其进行细化分析。<br>⑧ 针对不同的超支原因，采取对应的解决措施。<br>⑨ 定期对项目的成本绩效进行评估，及时按情况进行调整。", hook: "" }
                ]
            },
            {
                chapter: "第11章 项目成本管理",
                questions: [
                    { id: "c11_q1", title: "【问1】成本管理的过程及其过程组?", priority: "🔴", content: "① 规划成本管理->规划过程组<br>② 估算成本->规划过程组<br>③ 制定预算->规划过程组<br>④ 控制成本->监控过程组", hook: "" },
                    { id: "c11_q2", title: "【问2】项目预算的形成步骤?", priority: "🟡", content: "① 先汇总各项目活动的成本估算及其应急储备，得到相关工作包的成本；<br>② 然后汇总各工作包的成本，得到控制账户的成本；<br>③ 接着再汇总各控制账户的成本，得到成本基准；<br>④ 最后，在成本基准之上增加管理储备，得到项目预算。", hook: "" },
                    { id: "c11_q3", title: "【问3】成本控制的目标?", priority: "🟢", content: "① 对造成成本基准变更的因素施加影响<br>② 确保所有变更请求都得到及时处理<br>③ 当变更实际发生时，管理这些变更<br>④ 确保成本支出不超过批准的资金限额<br>⑤ 监督成本绩效，找出并分析与成本基准间的偏差<br>⑥ 对照资金支出，监督工作绩效<br>⑦ 防止在成本或资源使用报告中出现未经批准的变更<br>⑧ 向干系人报告所有经批准的变更及其相关成本<br>⑨ 设法把预期的成本超支控制在可接受的范围内等", hook: "" },
                    { id: "c11_q4", title: "【问4】控制成本的数据分析技术", priority: "🟡", content: "① 挣值分析；② 偏差分析；③ 趋势分析；④ 储备分析", hook: "" }
                ]
            },
            {
                chapter: "第12章 项目质量管理",
                questions: [
                    { id: "c12_q1", title: "【问1】质量管理的过程及其过程组?", priority: "🔴", content: "① 规划质量管理->规划过程组<br>② 管理质量->执行过程组<br>③ 控制质量->监控过程组", hook: "" },
                    { id: "c12_q2", title: "【问2】按有效性递增排列的五种质量管理水平?", priority: "🟢", content: "① 通常，代价最大的方法是让客户发现缺陷。<br>② 控制质量过程包括先检测和纠正缺陷，再将可交付成果发送给客户。<br>③ 通过质量保证检查并纠正过程本身。<br>④ 将质量融入项目和产品的规划和设计中。<br>⑤ 在整个组织内创建一种关注并致力于实现过程和产品质量的文化", hook: "" },
                    { id: "c12_q3", title: "【问3】质量管理关注点?", priority: "🟡", content: "① 规划质量管理过程关注工作需要达到的质量<br>② 管理质量则关注管理整个项目期间的质量<br>③ 控制质量关注工作成果与质量要求的比较，确保结果可接受", hook: "" },
                    { id: "c12_q4", title: "【问4】规划质量管理的定义和作用?", priority: "🟡", content: "<b>定义：</b>规划质量管理是识别项目及其可交付成果的质量要求、标准，并书面描述项目将如何证明符合质量要求、标准的过程。<br><b>作用：</b>在整个项目期间如何管理和核实质量提供指南和方向。", hook: "" },
                    { id: "c12_q5", title: "【问5】管理质量的定义和作用?", priority: "🟡", content: "<b>定义：</b>管理质量是把组织的质量政策用于项目，并将质量管理计划转化为可执行的质量活动的过程。<br><b>作用：</b>①提高实现质量目标的可能性；②识别无效过程和导致质量低劣的原因；③使用控制质量过程的数据和结果向干系人展示项目的总体质量状态。", hook: "" },
                    { id: "c12_q6", title: "【问6】控制质量的定义和作用?", priority: "🟡", content: "<b>定义：</b>控制质量是为了评估绩效，确保项目输出完整、正确且满足客户期望，而监督和记录质量管理活动执行结果的过程。<br><b>作用：</b>①核实项目可交付成果和工作已经达到主要干系人的质量要求，可供最终验收；②确定项目输出是否达到预期目的，需要满足所有适用标准、要求、法规和规范。", hook: "" },
                    { id: "c12_q7", title: "【问7】质量成本?", priority: "🔴", content: "① 一致性成本：项目花费资金规避失败<br>② 非一致性成本：项目前后花费的资金<br>③ 一致性成本包括：预防成本(培训、文件过程、设备、完成时间)，评估成本(测试、检查、破环性试验损失)<br>④ 非一致性成本包括：内部失败成本(返工、废品)，外部失败成本(债务、保修工作、失去业务)", hook: "" },
                    { id: "c12_q8", title: "【问8】规划质量管理的数据技术?", priority: "🟡", content: "<b>数据收集：</b>标杆对照、头脑风暴、访谈<br><b>数据分析：</b>成本效益分析、质量成本<br><b>数据表现：</b>流程图、逻辑数据模型、矩阵图、思维导图", hook: "" },
                    { id: "c12_q9", title: "【问9】管理质量管理的数据技术?", priority: "🟡", content: "<b>数据收集：</b>核对单<br><b>数据分析：</b>备选方案分析、文件分析、过程分析、根本原因分析<br><b>数据表现：</b>亲和图、因果图、流程图、直方图、矩阵图、散点图", hook: "" },
                    { id: "c12_q10", title: "【问10】控制质量管理的数据技术?", priority: "🟡", content: "<b>数据收集：</b>核对单、核查表、统计抽样、问卷调查<br><b>数据分析：</b>绩效审查、根本原因分析<br><b>数据表现：</b>因果图、控制图、直方图、散点图", hook: "" },
                    { id: "c12_q11", title: "【问11】管理质量有助于?", priority: "🟡", content: "① 通过执行有关产品特定方面的设计准则计出最优的成熟产品；<br>② 建立信心，可以使未来输出在完工时满足特定的需求和期望；<br>③ 确保使用质量过程并确保其使用能够满足项目的质量目标；<br>④ 提高过程和活动的效率与效果，获得更好的成果和绩效并提高干系人的满意度。", hook: "" },
                    { id: "c12_q12", title: "【问12】管理质量和质量保证的区别?", priority: "🟢", content: "① 管理质量的定义比“质量保证”更广，因其可用于非项目工作。<br>② 质量保证着眼于项目使用的过程，遵守和满足标准，向干系人保证。<br>③ 管理质量包括所有质量保证活动，还与产品设计和过程改进有关。管理质量的工作属于质量成本框架中的一致性工作。", hook: "" },
                    { id: "c12_q13", title: "【问13】质量审计的目标?", priority: "🟡", content: "① 识别全部正在实施的良好及最佳实践<br>② 识别全部违规做法、差距及不足。<br>③ 分享类似项目的良好实践。<br>④ 积极、主动地提供协助，以改进过程的执行。<br>⑤ 强调每次审计都应对组织经验教训的积累做出贡献。", hook: "" }
                ]
            },
            {
                chapter: "第13章 项目资源管理",
                questions: [
                    { id: "c13_q1", title: "【问1】资源管理的过程及其过程组?", priority: "🔴", content: "① 规划资源管理->规划过程组<br>② 估算活动资源->规划过程组<br>③ 获取资源->执行过程组<br>④ 建设团队->执行过程组<br>⑤ 管理团队->执行过程组<br>⑥ 控制资源->监控过程组", hook: "" },
                    { id: "c13_q2", title: "【问2】5种常用的冲突解决方法?", priority: "🔴", content: "① 撤退/回避；② 缓和/包容；③ 妥协/调解；④ 强迫/命令；⑤ 合作/解决问题。", hook: "" },
                    { id: "c13_q3", title: "【问3】马斯洛需求层次理论?", priority: "🟡", content: "① 生理需求；② 安全需求；③ 社会交往需求；④ 受尊重需求；⑤ 自我实现需求。", hook: "" },
                    { id: "c13_q4", title: "【问4】赫茨伯格双因素理论?", priority: "🟢", content: "① 保健因素：工作环境、工资薪水、公司政策、个人生活、管理监督、人际关系等。<br>② 激励因素：成就、承认、工作本身、责任、发展机会等。", hook: "" },
                    { id: "c13_q5", title: "【问5】期望理论的计算公式?", priority: "🟡", content: "激发力量=目标效价×期望值", hook: "" },
                    { id: "c13_q6", title: "【问6】RACI矩阵", priority: "🔴", content: "R执行；A负责；C咨询；I知情", hook: "" },
                    { id: "c13_q7", title: "【问7】团队章程的内容?", priority: "🟡", content: "团队价值观、沟通指南、决策标准和过程、冲突处理过程、会议指南和团队共识。", hook: "" },
                    { id: "c13_q8", title: "【问8】团队章程的作用?", priority: "🟡", content: "① 对项目团队成员的可接受行为确定了明确的期望<br>② 有助于减少误解，提高生产力<br>③ 团队成员可以了解彼此重要的价值观。", hook: "" },
                    { id: "c13_q9", title: "【问9】内外部资源的获取?", priority: "🟡", content: "内部资源由职能经理或资源经理负责获取，外部资源则通过采购过程获得", hook: "" },
                    { id: "c13_q10", title: "【问10】资源的选择标准?", priority: "🟡", content: "可用性、成本、能力、经验、知识、技能、态度、国际因素。", hook: "" },
                    { id: "c13_q11", title: "【问11】需要预分派的情况", priority: "🟡", content: "① 在竞标过程中承诺分派特定人员进行项目工作；<br>② 项目取决于特定人员的专有技能；<br>③ 在完成资源管理计划的前期工作之前，项目章程或过程已经指定了特定人员。", hook: "" },
                    { id: "c13_q12", title: "【问12】可实现团队的高效运行的行为?", priority: "🟡", content: "① 使用开放与有效的沟通<br>② 创造团队建设机遇<br>③ 建立团队成员间的信任<br>④ 以建设性方式管理冲突<br>⑤ 鼓励合作型的问题解决方法<br>⑥ 鼓励合作型的决策方法等。", hook: "" },
                    { id: "c13_q13", title: "【问13】建设项目团队的目标?", priority: "🟡", content: "① 提高团队成员的知识和技能。<br>② 提高团队成员之间的信任和认同感。<br>③ 创建富有生气、凝聚力和协作性的团队文化。<br>④ 提高团队参与决策的能力。", hook: "" },
                    { id: "c13_q14", title: "【问14】评价团队有效性的指标?", priority: "🟡", content: "① 个人技能的改进<br>② 团队能力的改进<br>③ 团队成员离职率的降低。<br>④ 团队凝聚力的加强", hook: "" },
                    { id: "c13_q15", title: "【问15】控制资源过程关注?", priority: "🟡", content: "① 监督资源支出<br>② 及时识别和处理资源缺乏/剩余情况<br>③ 确保根据计划和项目需求使用并释放资源<br>④ 出现资源相关问题时通知相应干系人<br>⑤ 影响可以导致资源使用变更的因素<br>⑥ 在变更实际发生时对其进行管理等", hook: "" }
                ]
            },
            {
                chapter: "第14章 项目沟通管理",
                questions: [
                    { id: "c14_q1", title: "【问1】沟通管理的过程及其过程组?", priority: "🔴", content: "① 规划沟通管理->规划过程组<br>② 管理沟通->执行过程组<br>③ 监督沟通->监控过程组", hook: "" },
                    { id: "c14_q2", title: "【问2】书面沟通的5C原则?", priority: "🟡", content: "① 正确的语法和拼写<br>② 简洁的表述<br>③ 清晰的目的和表述<br>④ 连贯的思维逻辑<br>⑤ 善用控制语句和承接", hook: "" },
                    { id: "c14_q3", title: "【问3】规划沟通的定义和作用?", priority: "🟡", content: "<b>定义：</b>规划沟通管理是基于需求、组织资产和具体项目需求，为项目沟通活动制定恰当的方法和计划的过程。<br><b>作用：</b>①及时向干系人提供相关信息；②引导干系人有效参与项目；③编制书面沟通计划。", hook: "" },
                    { id: "c14_q4", title: "【问4】管理沟通的定义和作用?", priority: "🟡", content: "<b>定义：</b>管理沟通是确保项目信息及时且恰当地创建、收集、分发等的过程。<br><b>作用：</b>促成项目团队与干系人之间的有效信息流动。", hook: "" },
                    { id: "c14_q5", title: "【问5】监督沟通的定义和作用?", priority: "🟡", content: "<b>定义：</b>监督沟通是确保满足项目及其干系人的信息需求的过程。<br><b>作用：</b>按要求优化信息传递流程。", hook: "" },
                    { id: "c14_q6", title: "【问6】沟通方法?", priority: "🔴", content: "① 互动沟通：两方或多方实时交换(会议、电话等)。<br>② 推式沟通：向特定方发送，保发送不保理解(邮件)。<br>③ 拉式沟通：接收方自行访问，适用大量信息和受众。", hook: "" },
                    { id: "c14_q7", title: "【问7】管理沟通过程的沟通技能?", priority: "🟡", content: "① 沟通胜任力；② 反馈；③ 非口头技能；④ 演示", hook: "" },
                    { id: "c14_q8", title: "【问8】管理沟通的人际关系与团队技能?", priority: "🟡", content: "积极倾听，冲突管理，文化意识，会议管理，人际交往，政策意识", hook: "" }
                ]
            },
            {
                chapter: "第15章 项目风险管理",
                questions: [
                    { id: "c15_q1", title: "【问1】风险管理的过程及其过程组?", priority: "🔴", content: "① 规划风险管理->规划过程组<br>② 识别风险->规划过程组<br>③ 实施定性风险分析->规划过程组<br>④ 实施定量风险分析->规划过程组<br>⑤ 规划风险应对->规划过程组<br>⑥ 实施风险应对->执行过程组<br>⑦ 监督风险->监控过程组", hook: "" },
                    { id: "c15_q2", title: "【问2】识别风险的数据分析技术有?", priority: "🟡", content: "根本原因分析、假设条件和制约因素分析、SWOT分析、文件分析", hook: "" },
                    { id: "c15_q3", title: "【问3】SWOT分析?", priority: "🟡", content: "SWOT分析对项目的优势、劣势、机会和威胁进行逐个检查。它会将内部产生的风险包含在内，从而拓宽识别风险的范围。", hook: "" },
                    { id: "c15_q4", title: "【问4】风险登记册的内容?", priority: "🟡", content: "简短的风险名称、风险类别、当前风险状态、原因、对目标的影响、风险触发条件、受影响的WBS组件，以及时间信息。", hook: "" },
                    { id: "c15_q5", title: "【问5】实施定性风险分析的数据技术?", priority: "🟢", content: "<b>数据收集：</b>访谈<br><b>数据分析：</b>风险数据质量评估，风险概率和影响评估，其他参数评估<br><b>数据表现：</b>概率和影响矩阵，层级图", hook: "" },
                    { id: "c15_q6", title: "【问6】实施定量风险分析的数据技术?", priority: "🟢", content: "<b>数据收集：</b>访谈<br><b>数据分析：</b>模拟，敏感性分析，决策树分析，影响图", hook: "" },
                    { id: "c15_q7", title: "【问7】威胁应对策略?", priority: "🔴", content: "① 上报；② 规避；③ 转移；④ 减轻；⑤ 接受。", hook: "" },
                    { id: "c15_q8", title: "【问8】机会应对策略?", priority: "🔴", content: "① 上报；② 开拓；③ 分享；④ 提高；⑤ 接受。", hook: "" },
                    { id: "c15_q9", title: "【问9】整体应对策略?", priority: "🔴", content: "① 规避；② 开拓；③ 转移或分享；④ 减轻或提高；⑤ 接受。", hook: "" }
                ]
            },
            {
                chapter: "第16章 项目采购管理",
                questions: [
                    { id: "c16_q1", title: "【问1】采购管理的过程及其过程组?", priority: "🔴", content: "① 规划采购管理->规划过程组<br>② 实施采购->执行过程组<br>③ 控制采购->监控过程组", hook: "" },
                    { id: "c16_q2", title: "【问2】合同管理过程?", priority: "🔴", content: "① 合同签订管理<br>② 合同履行管理<br>③ 合同变更管理<br>④ 合同档案管理<br>⑤ 合同违约索赔管理", hook: "" },
                    { id: "c16_q3", title: "【问3】采购步骤?(背几条即可)", priority: "🟡", content: "① 准备工作说明书<br>② 准备高层级成本估算并制定预算<br>③ 发布招标广告<br>④ 确定合格卖方名单<br>⑤ 准备发布招标文件<br>⑥ 卖方提交建议书<br>⑦ 技术和成本评估<br>⑧ 选出中标建议书<br>⑨ 结束谈判，签署合同", hook: "" },
                    { id: "c16_q4", title: "【问4】规划采购的定义和作用?", priority: "🟡", content: "<b>定义：</b>记录项目采购决策、明确采购方法，及识别潜在卖方的过程。<br><b>作用：</b>确定是否从外部获取货物和服务，以及时间、方式。", hook: "" },
                    { id: "c16_q5", title: "【问5】实施采购的定义和作用?", priority: "🟡", content: "<b>定义：</b>获取卖方应答、选择卖方并授予合同的过程。<br><b>作用：</b>选定合格卖方并签署关于交付的法律协议。", hook: "" },
                    { id: "c16_q6", title: "【问6】控制采购的定义和作用?", priority: "🟡", content: "<b>定义：</b>管理采购关系、监督合同绩效、实施变更和纠偏，以及关闭合同的过程。<br><b>作用：</b>确保买卖双方履行法律协议。", hook: "" },
                    { id: "c16_q7", title: "【问7】供方选择分析有哪些?", priority: "🟡", content: "最低成本、仅凭资质、基于质量或技术方案得分、基于质量和成本、唯一来源、固定预算。", hook: "" },
                    { id: "c16_q8", title: "【问8】采购策略有哪些", priority: "🟡", content: "① 交付方法；② 合同支付类型；③ 采购阶段", hook: "" },
                    { id: "c16_q9", title: "【问9】采购工作说明书的内容?", priority: "🟡", content: "① 规格；② 所需数量；③ 质量水平；④ 绩效数据；⑤ 履约期间；⑥ 工作地点；⑦ 其他要求。", hook: "" },
                    { id: "c16_q10", title: "【问10】招标文件的内容?", priority: "🟡", content: "信息邀请书、报价邀请书、建议邀请书。", hook: "" },
                    { id: "c16_q11", title: "【问11】正式关闭采购的要求?", priority: "🟡", content: "① 已按时按质按技术要求交付全部可交付成果；<br>② 没有未决索赔或发票，全部最终款项已付清。", hook: "" },
                    { id: "c16_q12", title: "【问12】合同类型?", priority: "🟡", content: "按付款方式划分：总价合同、工料合同、成本补偿合同", hook: "" },
                    { id: "c16_q13", title: "【问13】合同分包的必要条件?", priority: "🔴", content: "① 经过买方认可<br>② 分包的部分必须是项目非主体工作<br>③ 只能分包部分项目，而不能转包整个项目<br>④ 分包方必须具备相应的资质条件<br>⑤ 分包方不能再次分包", hook: "" },
                    { id: "c16_q14", title: "【问14】总价合同包括?", priority: "🟡", content: "① 固定总价合同(FFP)<br>② 总价加激励费用合同(FPIF)<br>③ 总价加经济价格调整合同(FPEPA)<br>④ 订购单(单边合同)", hook: "" },
                    { id: "c16_q15", title: "【问15】成本补偿合同包括?", priority: "🟡", content: "① 成本加固定费用合同(CPFF)<br>② 成本加激励费用(CPIF)<br>③ 成本加奖励费用(CPAF)", hook: "" },
                    { id: "c16_q16", title: "【问16】CPIF合同下的计算公式?", priority: "🔴", content: "(1) 如果实际成本大于目标成本：卖方可以得到的付款总数=“目标成本+目标费用+<b>买方应负担的成本超支</b>”<br>(2) 如果实际成本小于目标成本：卖方可以得到的付款总数=“目标成本+目标费用-<b>买方应享受的成本节约</b>”。", hook: "" },
                    { id: "c16_q17", title: "【问17】解决合同争议的方法?", priority: "🟡", content: "① 谈判(协商) ② 调解 ③ 仲裁 ④ 诉讼", hook: "" },
                    { id: "c16_q18", title: "【问18】合同索赔的原则?", priority: "🟡", content: "① 索赔必须以合同为依据<br>② 必须注意资料的积累<br>③ 及时、合理地处理索赔<br>④ 加强索赔的前瞻性", hook: "" },
                    { id: "c16_q19", title: "【问19】合同索赔流程?", priority: "🟢", content: "① 提出索赔要求<br>② 报送索赔资料<br>③ 监理工程师答复<br>④ 监理工程师逾期答复后果<br>⑤ 持续索赔<br>⑥ 仲裁与诉讼", hook: "" }
                ]
            },
            {
                chapter: "第17章 项目干系人管理",
                questions: [
                    { id: "c17_q1", title: "【问1】干系人管理的过程及其过程组?", priority: "🔴", content: "① 识别干系人->启动过程组<br>② 规划干系人参与->规划过程组<br>③ 管理干系人参与->执行过程组<br>④ 监督干系人参与->监控过程组", hook: "" },
                    { id: "c17_q2", title: "【问2】识别干系人的定义和作用?", priority: "🟡", content: "<b>定义：</b>定期识别干系人，分析记录利益、参与度、影响力的过程。<br><b>作用：</b>建立适度关注。", hook: "" },
                    { id: "c17_q3", title: "【问3】规划干系人参与的定义和作用?", priority: "🟡", content: "<b>定义：</b>根据需求和利益制定参与方法的过程。<br><b>作用：</b>提供有效互动的可行计划。", hook: "" },
                    { id: "c17_q4", title: "【问4】管理干系人参与的定义和作用?", priority: "🟡", content: "<b>定义：</b>通过沟通协作满足需求与期望、处理问题、促进参与的过程。<br><b>作用：</b>尽可能提高支持度，降低抵制程度。", hook: "" },
                    { id: "c17_q5", title: "【问5】监督干系人参与的定义和作用?", priority: "🟡", content: "<b>定义：</b>监督干系人关系并修订参与策略的过程。<br><b>作用：</b>维持或提升参与活动的效率和效果。", hook: "" },
                    { id: "c17_q6", title: "【问6】干系人映射分析分类方法", priority: "🔴", content: "① 权力利益方格、权力影响方格或作用影响方格；<br>② 干系人立方体；<br>③ 凸显模型；<br>④ 影响方向；<br>⑤ 优先级排序", hook: "" },
                    { id: "c17_q7", title: "【问7】触发干系人参与计划更新的情况?", priority: "🟡", content: "① 项目新阶段开始；<br>② 组织结构或行业内部发生变化；<br>③ 特定干系人对项目成功的重要性发生变化；<br>④ 当其他过程导致需要重新审查策略等。", hook: "" },
                    { id: "c17_q8", title: "【问8】干系人参与水平可分为?", priority: "🟡", content: "① 不了解型；② 抵制型；③ 中立型；④ 支持型；⑤ 领导型。", hook: "" },
                    { id: "c17_q9", title: "【问9】管理干系人参与需要开展的活动?", priority: "🟡", content: "① 引导干系人参与，获取承诺<br>② 通过谈判和沟通的方式管理干系人期望<br>③ 处理风险或潜在关注点，预测未来问题<br>④ 澄清和解决已识别的问题等", hook: "" }
                ]
            },
            {
                chapter: "第18章 项目绩效域",
                questions: [
                    { id: "c18_q1", title: "【问1】干系人绩效域要点?", priority: "🔴", content: "促进干系人参与(识别、理解和分析、优先级排序、参与、监督)", hook: "" },
                    { id: "c18_q2", title: "【问2】干系人绩效域预期目标和检查指标?", priority: "🔴", content: "① 与干系人建立高效的工作关系<-干系人参与的连续性<br>② 干系人认同项目目标<-变更的频率<br>③ 支持项目的干系人提高了满意度，反对者没有负面影响<-(干系人行为,干系人满意度,风险)", hook: "认同，关系，高满意" },
                    { id: "c18_q3", title: "【问3】团队绩效域要点?", priority: "🔴", content: "① 项目团队文化<br>② 高绩效项目团队<br>③ 领导力技能", hook: "" },
                    { id: "c18_q4", title: "【问4】团队绩效域预期目标和检查指标?", priority: "🔴", content: "① 共享责任<-目标和责任心<br>② 建立高绩效团队<-(信任与协作程度，适应变化的能力，彼此赋能)<br>③ 所有团队成员都展现出相应的领导力<-管理和领导力风格适宜性", hook: "共享，绩效，现技能" },
                    { id: "c18_q5", title: "【问5】情商的四个层次?", priority: "🟡", content: "① 自我意识；② 自我管理；③ 社交意识；④ 社交技能", hook: "两自我，两社交" },
                    { id: "c18_q6", title: "【问6】开发方法和生命周期绩效域要点?", priority: "🟡", content: "① 交付节奏<br>② 开发方法<br>③ 开发方法的选择<br>④ 协调交付节奏和开发方法", hook: "" },
                    { id: "c18_q7", title: "【问7】开发方法和生命周期绩效域预期目标和检查指标?", priority: "🔴", content: "① 开发方法与项目可交付物相符合<-产品质量和变更成本<br>② 将项目交付与干系人价值紧密关联<-价值导向型项目阶段<br>③ 项目生命周期由促进交付节凑的阶段和开发方法组成<-适宜的交付节奏和开发方法", hook: "方法相符，价关联，交付开发，组周期" },
                    { id: "c18_q8", title: "【问8】交付节奏?", priority: "🟡", content: "一次性交付、多次交付、定期交付和持续交付", hook: "" },
                    { id: "c18_q9", title: "【问9】开发方法?", priority: "🟡", content: "预测型方法、混合型方法和适应型方法", hook: "" },
                    { id: "c18_q10", title: "【问10】规划绩效域要点?", priority: "🔴", content: "① 规划的影响因素<br>② 项目估算<br>③ 项目团队组成和结构规划<br>④ 沟通规划<br>⑤ 实物资源规划<br>⑥ 采购规划<br>⑦ 变更规划<br>⑧ 度量指标和一致性", hook: "瑛姑团购，食材贬值" },
                    { id: "c18_q11", title: "【问11】规划绩效域预期目标和检查指标?", priority: "🔴", content: "① 有条理推进<-绩效偏差<br>② 应用系统的方法交付<-规划的整体性<br>③ 演变情况进行详细说明<-规划的详尽程度<br>④ 时间成本适当<-规划适宜性<br>⑤ 内容充分<-规划的充分性<br>⑥ 可根据变化调整<-可适应变化", hook: "协调，系统，说演变；时间，需求，可调整" },
                    { id: "c18_q12", title: "【问12】项目工作绩效域要点?", priority: "🔴", content: "① 项目过程<br>② 项目制约因素<br>③ 专注于工作过程和能力<br>④ 管理沟通和参与<br>⑤ 管理实物资源<br>⑥ 处理采购事宜<br>⑦ 监督新工作和变更<br>⑧ 学习与持续改进", hook: "国营组购食材薪金" },
                    { id: "c18_q13", title: "【问13】项目工作绩效域预期目标和检查指标?", priority: "🔴", content: "① 高效且有效的项目绩效<-状态报告<br>② 适合项目和环境的过程<-(过程的适宜性,相关性和有效性)<br>③ 干系人适当的沟通和参与<-沟通有效性<br>④ 有效管理实物资源<-资源利用率<br>⑤ 有效管理采购<-采购过程适宜<br>⑥ 有效处理变更<-变更处理情况<br>⑦ 持续学习改进提高了团队能力<-团队绩效", hook: "过程，绩效，干参与；资源，采购，变，能力" },
                    { id: "c18_q14", title: "【问14】管理实物资源的目标?", priority: "🟡", content: "① 减少或消除现场的材料搬运和储存<br>② 消除材料等待时间<br>③ 最小化报废和浪费<br>④ 促进安全的工作环境等", hook: "" },
                    { id: "c18_q15", title: "【问15】交付绩效域要点?", priority: "🔴", content: "① 价值的交付；② 可交付物；③ 质量", hook: "价可量" },
                    { id: "c18_q16", title: "【问16】交付绩效域预期目标和检查指标?", priority: "🔴", content: "① 有助于实现战略目标<-战略一致性<br>② 实现了预期成果<-项目完成度<br>③ 预定时间内实现收益<-项目收益<br>④ 清晰理解需求<-需求稳定性<br>⑤ 接受并满意<-(干系人满意度,质量问题)", hook: "战略，成果，有收益，需求清晰，姐满意" },
                    { id: "c18_q17", title: "【问17】度量绩效域要点?", priority: "🔴", content: "① 制定有效的度量指标<br>② 度量内容及相应指标<br>③ 展示度量信息和结果<br>④ 度量陷阱<br>⑤ 基于度量进行诊断<br>⑥ 持续改进", hook: "定指标、量指标、示结果、防陷阱、行诊断、持改进" },
                    { id: "c18_q18", title: "【问18】度量绩效域预期目标和检查指标?", priority: "🔴", content: "① 充分理解状况<-度量结果和报告<br>② 数据充分支持决策<-度量结果<br>③ 及时采取行动保最佳绩效<-度量结果<br>④ 能够预测评估决策实现价值<-工作绩效数据", hook: "充分，理解，决策，保佳绩" },
                    { id: "c18_q19", title: "【问19】SMART特征?", priority: "🟡", content: "S(具体的)，M(可测量的/有意义的)，A(可实现的)，R(具有相关性)，T(具有及时性)", hook: "" },
                    { id: "c18_q20", title: "【问20】霍桑效应?", priority: "🟡", content: "对某一事物进行度量时会对其行为产生影响，因此需要谨慎制定度量指标。", hook: "" },
                    { id: "c18_q21", title: "【问21】虚荣指标?", priority: "🟡", content: "对决策没有帮助的度量指标一般属于虚荣指标。", hook: "" },
                    { id: "c18_q22", title: "【问22】不确定性绩效域要点?", priority: "🔴", content: "① 风险；② 模糊性；③ 复杂性；④ 不确定性的应对方法", hook: "疯魔副队" },
                    { id: "c18_q23", title: "【问23】不确定性绩效域预期目标和检查指标?", priority: "🔴", content: "① 了解项目运行环境<-环境因素<br>② 积极识别分析应对<-风险应对措施<br>③ 了解多因素互依赖关系<-应对措施适宜性<br>④ 预测威胁了解后果<-风险管理机制或系统<br>⑤ 最小化负面影响<-项目绩效处于临界值内<br>⑥ 利用机会改进<-利用机会的机制<br>⑦ 有效利用储备与目标一致<-储备使用", hook: "识别，环境，互依赖；后果，最小，改，储备" },
                    { id: "c18_q24", title: "【问24】处理复杂性的方法?", priority: "🟡", content: "① 处理基于系统的复杂性：解耦、模拟。<br>② 处理需要重新构建的复杂性：多样性、平衡。<br>③ 处理基于过程的复杂性：迭代、参与、故障保护。", hook: "" },
                    { id: "c18_q25", title: "【问25】不确定性的应对方法?", priority: "🟡", content: "① 收集信息<br>② 为多种结果做好准备<br>③ 集合设计<br>④ 增加韧性", hook: "" }
                ]
            },
            {
                chapter: "第19章 配置管理",
                questions: [
                    { id: "c19_q1", title: "【问1】配置管理的过程?", priority: "🔴", content: "① 制订配置管理计划<br>② 配置项识别<br>③ 配置项控制<br>④ 配置状态报告<br>⑤ 配置审计<br>⑥ 配置管理回顾与改进", hook: "计、识、控、报、审、改" },
                    { id: "c19_q2", title: "【问2】配置库的3种类型?", priority: "🟡", content: "开发库、受控库、产品库", hook: "" },
                    { id: "c19_q3", title: "【问3】基于配置库的变更控制?", priority: "🟡", content: "① 将待升级的基线从产品库中取出，放入受控库。<br>② 程序员将欲修改的代码段从受控库中检出Check out，放入自己的开发库中进行修改。<br>③ 程序员将开发库中修改好的代码段检入Check in受控库。<br>④ 修改工作完成后，将受控库中的新基线存入产品库中。", hook: "" },
                    { id: "c19_q4", title: "【问4】配置审计的功能?", priority: "🟡", content: "① 防止向用户提交不适合的产品<br>② 发现不完善的实现<br>③ 找出各配置项间不匹配或不相容的现象<br>④ 确认配置项已纳入基线并入库保存<br>⑤ 确认记录和文档保持着可追溯性", hook: "" },
                    { id: "c19_q5", title: "【问5】功能配置审计需要验证的内容?", priority: "🟡", content: "① 配置项的开发已圆满完成。<br>② 配置项已达到规定的性能和功能特征。<br>③ 操作和支持文档已完成并且是符合要求的。", hook: "" },
                    { id: "c19_q6", title: "【问6】物理配置审计需要验证的内容?", priority: "🟡", content: "① 要交付的配置项是否存在。<br>② 配置项中是否包含了所有必需的项目。", hook: "" },
                    { id: "c19_q7", title: "【问7】变更的工作程序?", priority: "🔴", content: "① 变更申请<br>② 对变更的初审<br>③ 变更方案论证<br>④ 变更审查<br>⑤ 发出通知并实施<br>⑥ 实施监控<br>⑦ 效果评估<br>⑧ 变更收尾", hook: "" },
                    { id: "c19_q8", title: "【问8】变更中项目经理的作用?", priority: "🟡", content: "① 响应变更提出者的需求<br>② 评估变更对项目的影响及应对方案<br>③ 将需求由技术要求转化为资源需求供决策<br>④ 据评审结果实施即调整基准，确保基准反映情况", hook: "" }
                ]

            {

            try {
                const savedMastery = JSON.parse(localStorage.getItem(STORAGE_KEYS.mastery) || '[]');
                if (Array.isArray(savedMastery)) {
                    state.masteredQs = new Set(savedMastery);
                }
            } catch (error) {
                console.warn('读取掌握进度失败，已跳过。', error);
            }

            try {
                const savedNotes = JSON.parse(localStorage.getItem(STORAGE_KEYS.notes) || '{}');
                if (savedNotes && typeof savedNotes === 'object' && !Array.isArray(savedNotes)) {
                    state.notes = savedNotes;
                }
            } catch (error) {
                console.warn('读取备注失败，已跳过。', error);
            }

            const savedNotesVisible = localStorage.getItem(STORAGE_KEYS.notesVisible);
            if (savedNotesVisible !== null) {
                state.notesVisible = savedNotesVisible === 'true';
            }
        }

        function initTheme() {
            const savedTheme = localStorage.getItem(STORAGE_KEYS.theme);
            state.isDarkMode = savedTheme ? savedTheme === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
            applyTheme();
        }

        function toggleTheme() {
            state.isDarkMode = !state.isDarkMode;
            localStorage.setItem(STORAGE_KEYS.theme, state.isDarkMode ? 'dark' : 'light');
            applyTheme();
            renderDashboardCharts();
        }

            document.body.classList.toggle('dark', state.isDarkMode);

            state.notesVisible = !state.notesVisible;

            if (state.processTraining.orderMode === 'sequence') {
                state.processTraining.currentIndex = (state.processTraining.currentIndex + 1) % PROCESS_TRAINING_DATA.length;
            } else {
                let nextIndex = state.processTraining.currentIndex;
                while (PROCESS_TRAINING_DATA.length > 1 && nextIndex === state.processTraining.currentIndex) {
                    nextIndex = Math.floor(Math.random() * PROCESS_TRAINING_DATA.length);
                }
                state.processTraining.currentIndex = nextIndex;
            }
            state.processTraining.answerVisible = false;
            renderProcessTraining();
        }

            state.processTraining.currentIndex = (state.processTraining.currentIndex - 1 + PROCESS_TRAINING_DATA.length) % PROCESS_TRAINING_DATA.length;

            renderProcessTraining();

                        </details>

                        <details class="mobile-training-panel shell-panel rounded-xl shadow-sm border" ontoggle="setTrainingPanelOpen('directoryOpen', this.open)" ${state.processTraining.mobilePanels.directoryOpen ? 'open' : ''}>
                            <summary class="px-4 py-4 flex items-center justify-between cursor-pointer">
                                <span class="font-semibold">过程目录</span>
                                <span class="text-sm muted-text">展开</span>
                            </summary>
                            <div class="px-4 pb-4 border-t shell-border training-directory-mobile">
                                <div class="text-sm muted-text leading-relaxed pt-4 mb-4">按知识领域查看全部过程，点击可直接跳转。颜色标签表示所属过程组。</div>
                                <div class="space-y-4">
                                    ${renderProcessTrainingDirectory()}
                                </div>
                            </div>
                        </details>

                        <div class="training-card shell-panel p-5 md:p-6 rounded-xl shadow-sm border">
                            <div class="flex flex-wrap gap-3 items-center justify-between mb-5">
                                <div class="flex items-center gap-2 text-sm muted-text">
                                <span class="training-pill px-3 py-1 rounded-full">${item.领域}</span>
                                <span class="process-group-badge" style="background:${processGroupMeta.color};">${processGroupMeta.label}过程组</span>
                                <span>第 ${state.processTraining.currentIndex + 1} / ${PROCESS_TRAINING_DATA.length} 题</span>
                                </div>
                                <div class="text-sm muted-text">本轮正确率：${accuracy} (${state.processTraining.sessionCorrect}/${state.processTraining.sessionTotal})</div>
                            </div>

                            <div class="mb-5">
                                <div class="text-sm muted-text mb-2">${prompt.label}</div>
                                <div class="training-prompt text-lg md:text-xl font-semibold leading-relaxed">${prompt.body}</div>
                            </div>

                            ${state.processTraining.mode === 'recite' ? `
                                <div class="note-box rounded-xl p-4 mb-5">
                                    ${getProcessTrainingAnswer(item)}
                                </div>
                                <div class="flex flex-wrap gap-3">
                                    <button onclick="previousProcessTrainingCard()" class="text-sm px-4 py-2 rounded-md shell-panel-muted border shell-border">上一题</button>
                                    <button onclick="nextProcessTrainingCard()" class="text-sm px-4 py-2 rounded-md training-pill">下一题</button>
                                </div>
                            ` : state.processTraining.answerVisible ? `
                                <div class="note-box rounded-xl p-4 mb-5">
                                    ${getProcessTrainingAnswer(item)}
                                </div>
                                <div class="flex flex-wrap gap-3">
                                    <button onclick="markProcessTrainingResult(false)" class="text-sm px-4 py-2 rounded-md shell-panel-muted border shell-border">再练一次</button>
                                    <button onclick="markProcessTrainingResult(true)" class="text-sm px-4 py-2 rounded-md training-pill">记住了</button>
                                    <button onclick="previousProcessTrainingCard()" class="text-sm px-4 py-2 rounded-md shell-panel border shell-border">上一题</button>
                                    <button onclick="nextProcessTrainingCard()" class="text-sm px-4 py-2 rounded-md shell-panel border shell-border">下一题</button>
                                </div>
                            ` : `
                                <div class="flex flex-wrap gap-3">
                                    <button onclick="revealProcessTrainingAnswer()" class="text-sm px-4 py-2 rounded-md training-pill">想好了，显示答案</button>
                                    <button onclick="previousProcessTrainingCard()" class="text-sm px-4 py-2 rounded-md shell-panel-muted border shell-border">上一题</button>
                                    <button onclick="nextProcessTrainingCard()" class="text-sm px-4 py-2 rounded-md shell-panel-muted border shell-border">下一题</button>
                                </div>
                            `}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCards(idx) {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            
            const chapter = studyData[idx];
            const filter = state.currentFilter;
            
            const filteredQs = chapter.questions.filter(q => filter === "ALL" || q.priority === filter);

            if(filteredQs.length === 0) {
                container.innerHTML = '<p class="muted-text text-center py-8">该分类下暂无考点。</p>';
                syncExpandButtonState();
                return;
            }

            filteredQs.forEach(q => {
                const isMastered = state.masteredQs.has(q.id);
                const isOpen = state.openQs.has(q.id);
                const savedNote = state.notes[q.id] || '';
                const savedNoteEscaped = escapeHtml(savedNote);
                const card = document.createElement('div');
                card.className = `shell-panel rounded-xl shadow-sm border ${isMastered ? 'card-mastered' : ''} overflow-hidden transition-colors duration-300`;
                
                let hookHtml = '';
                if(q.hook) {
                    hookHtml = `
                    <div class="mt-4 p-3 border rounded-md flex items-start hook-box">
                        <span class="text-amber-500 mr-2 shrink-0">💡</span>
                        <span class="text-sm font-medium">口诀：${q.hook}</span>
                    </div>`;
                }

                let noteHtml = '';
                if (state.notesVisible) {
                    noteHtml = `
                    <div class="mt-4 p-4 rounded-lg note-box" onclick="stopCardToggle(event)">
                        <div class="flex items-center justify-between gap-3 mb-3">
                            <div class="text-sm font-semibold">我的备注</div>
                            <div class="text-xs muted-text">${savedNote ? '已保存' : '未填写'}</div>
                        </div>
                        <textarea
                            id="note-input-${q.id}"
                            class="note-textarea shell-input text-sm rounded-md border px-3 py-2 outline-none focus:ring-2 focus:ring-amber-500"
                            placeholder="可记录易错点、口诀补充、自己的理解。"
                            onclick="stopCardToggle(event)"
                        >${savedNoteEscaped}</textarea>
                        <div class="flex items-center gap-2 mt-3">
                            <button onclick="saveNote(event, '${q.id}')" class="text-xs px-3 py-2 rounded-md shell-panel border shell-border transition-colors">保存备注</button>
                            <button onclick="removeNote(event, '${q.id}')" class="text-xs px-3 py-2 rounded-md shell-panel-muted border shell-border transition-colors">移除备注</button>
                        </div>
                    </div>`;
                }

                card.innerHTML = `
                    <div class="px-4 md:px-6 py-4 cursor-pointer flex justify-between items-center gap-3 hover:opacity-90 transition-colors" onclick="toggleCard('${q.id}')">
                        <div class="flex items-center gap-3 min-w-0">
                            <span class="text-xl" title="优先级">${q.priority}</span>
                            <h4 class="font-bold text-base md:text-lg min-w-0">${q.title}</h4>
                        </div>
                        <div class="flex items-center gap-2 md:gap-4 shrink-0">
                            <button onclick="toggleMastery(event, '${q.id}')" class="text-xs px-3 py-1 rounded-full border ${isMastered ? 'mastery-on' : 'mastery-off'} transition-colors whitespace-nowrap">
                                ${isMastered ? '✓ 已掌握' : '标为已掌握'}
                            </button>
                            <svg class="w-5 h-5 transform transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}" style="color: var(--muted-text);" id="icon-${q.id}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                    <div id="content-${q.id}" class="flip-card-inner px-4 md:px-6 pb-2 ${isOpen ? 'open' : ''}">
                        <div class="leading-relaxed text-sm md:text-base pt-2 border-t shell-border">
                            ${q.content}
                            ${hookHtml}
                            ${noteHtml}
                        </div>
                        <div class="pb-4"></div>
                    </div>
                `;
                container.appendChild(card);
            });

            syncExpandButtonState();
        }

        function toggleCard(id) {
            const content = document.getElementById(`content-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                icon.classList.remove('rotate-180');
                state.openQs.delete(id);
            } else {
                content.classList.add('open');
                icon.classList.add('rotate-180');
                state.openQs.add(id);
            }
            syncExpandButtonState();
        }

        function toggleAllCards() {
            const desktopBtn = document.getElementById('btn-expand-all');
            const mobileBtn = document.getElementById('btn-expand-all-mobile');
            const isOpenning = desktopBtn.innerText.includes('展开');
            
            document.querySelectorAll('.flip-card-inner').forEach(el => {
                const id = el.id.replace('content-', '');
                const icon = document.getElementById(`icon-${id}`);
                if (isOpenning) {
                    el.classList.add('open');
                    icon.classList.add('rotate-180');
                    state.openQs.add(id);
                } else {
                    el.classList.remove('open');
                    icon.classList.remove('rotate-180');
                    state.openQs.delete(id);
                }
            });
            
            const nextText = isOpenning ? '收起全部答案' : '展开全部答案';
            desktopBtn.innerText = nextText;
            mobileBtn.innerText = nextText;
        }

        function toggleMastery(event, id) {
            event.stopPropagation();
            if (state.masteredQs.has(id)) {
                state.masteredQs.delete(id);
            } else {
                state.masteredQs.add(id);
            }
            persistMasteryState();
            if(state.activeChapterIdx >= 0) {
                renderCards(state.activeChapterIdx);
            }
            updateGlobalProgress();
            updateDashboardCharts();
        }

        function saveNote(event, id) {
            event.stopPropagation();
            const textarea = document.getElementById(`note-input-${id}`);
            if (!textarea) return;
            const value = textarea.value.trim();
            if (value) {
                state.notes[id] = value;
            } else {
                delete state.notes[id];
            }
            persistNotesState();
            if (state.activeChapterIdx >= 0) {
                renderCards(state.activeChapterIdx);
            }
        }

        function removeNote(event, id) {
            event.stopPropagation();
            delete state.notes[id];
            persistNotesState();
            if (state.activeChapterIdx >= 0) {
                renderCards(state.activeChapterIdx);
            }
        }

        function stopCardToggle(event) {
            event.stopPropagation();
        }

        function persistMasteryState() {
            localStorage.setItem(STORAGE_KEYS.mastery, JSON.stringify([...state.masteredQs]));
        }

        function persistNotesState() {
            localStorage.setItem(STORAGE_KEYS.notes, JSON.stringify(state.notes));
        }

        function resetStudyProgress() {
            state.masteredQs.clear();
            state.openQs.clear();
            state.currentFilter = 'ALL';
            persistMasteryState();
            syncFilter('ALL');
            updateGlobalProgress();
            updateDashboardCharts();
            if (state.activeChapterIdx >= 0) {
                renderCards(state.activeChapterIdx);
            } else {
                showDashboard();
            }
            return '学习进度已重置，备注保留不变。';
        }

        function exposeConsoleTools() {
            window.resetStudyProgress = resetStudyProgress;
            window.originalStudyDataBackup = ORIGINAL_STUDY_DATA;
            window.cloneStudyDataBackup = () => cloneStudyData(ORIGINAL_STUDY_DATA);
        }

        function syncExpandButtonState() {
            const visibleCards = [...document.querySelectorAll('.flip-card-inner')];
            const hasCards = visibleCards.length > 0;
            const allOpen = hasCards && visibleCards.every(el => el.classList.contains('open'));
            const text = allOpen ? '收起全部答案' : '展开全部答案';
            document.getElementById('btn-expand-all').innerText = text;
            document.getElementById('btn-expand-all-mobile').innerText = text;
        }

        function updateGlobalProgress() {
            let total = 0;
            studyData.forEach(ch => total += ch.questions.length);
            const mastered = state.masteredQs.size;
            const pct = total === 0 ? 0 : Math.round((mastered / total) * 100);
            
            document.getElementById('global-progress-bar').style.width = `${pct}%`;
            document.getElementById('global-progress-text').innerText = `${pct}% (${mastered}/${total})`;
        }

        const chartColors = {
            red: '#ef4444', 
            yellow: '#eab308', 
            green: '#22c55e', 
            gray: '#e5e7eb',
            stone: '#78716c'
        };

        function calculateInitialStats() {
            let pCount = { "🔴": 0, "🟡": 0, "🟢": 0 };
            studyData.forEach(ch => {
                ch.questions.forEach(q => {
                    if(pCount[q.priority] !== undefined) pCount[q.priority]++;
                });
            });
            state.priorityStats = pCount;
        }

        function renderDashboardCharts() {
            const textColor = getComputedStyle(document.body).getPropertyValue('--page-text').trim() || '#292524';
            const borderColor = getComputedStyle(document.body).getPropertyValue('--panel-border').trim() || '#e7e5e4';
            const ctxPrio = document.getElementById('priorityChart').getContext('2d');
            if (priorityChartObj) priorityChartObj.destroy();
            priorityChartObj = new Chart(ctxPrio, {
                type: 'doughnut',
                data: {
                    labels: ['🔴 必背', '🟡 背诵', '🟢 熟练'],
                    datasets: [{
                        data: [state.priorityStats["🔴"], state.priorityStats["🟡"], state.priorityStats["🟢"]],
                        backgroundColor: [chartColors.red, chartColors.yellow, chartColors.green],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: textColor, font: { family: 'sans-serif' } } }
                    },
                    cutout: '65%'
                }
            });

            const ctxChap = document.getElementById('chapterChart').getContext('2d');
            if (chapterChartObj) chapterChartObj.destroy();
            
            const labels = studyData.map(ch => ch.chapter.split(' ')[0]);
            const totalData = studyData.map(ch => ch.questions.length);
            const masteredData = studyData.map(ch => 0); 

            chapterChartObj = new Chart(ctxChap, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '已掌握',
                            data: masteredData,
                            backgroundColor: chartColors.green,
                            borderRadius: 4
                        },
                        {
                            label: '待学习',
                            data: totalData,
                            backgroundColor: chartColors.gray,
                            borderRadius: 4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { stacked: true, grid: { display: false }, ticks: { color: textColor } },
                        y: { stacked: true, beginAtZero: true, border: { display: false }, ticks: { color: textColor }, grid: { color: borderColor } }
                    },
                    plugins: {
                        legend: { position: 'bottom', labels: { color: textColor } }
                    }
                }
            });
        }

        function updateDashboardCharts() {
            if(!chapterChartObj) return;
            
            const masteredData = studyData.map(ch => {
                return ch.questions.filter(q => state.masteredQs.has(q.id)).length;
            });
            const remainingData = studyData.map((ch, idx) => {
                return ch.questions.length - masteredData[idx];
            });

            chapterChartObj.data.datasets[0].data = masteredData;
            chapterChartObj.data.datasets[1].data = remainingData;
            chapterChartObj.update();
        }

        window.onload = initApp;
    </script>
</body>
</html>
